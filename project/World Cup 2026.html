function AuthScreen({onAuth}){
  const lang=useContext(LangCtx);const l=T[lang];
  const lastAuth=gs('lastAuthUser',null);
  const authProfiles=gs('authProfiles',{})||{};
  const [form,setForm]=useState(()=>({username:lastAuth?.username||'',roomCode:lastAuth?.roomCode||''}));
  const [err,setErr]=useState('');
  const set=k=>e=>setForm(f=>({...f,[k]:e.target.value}));

  function startGuestMode(){
    const guestRoomId='room-guest-local';
    const guestUserId='guest-local';
    const guestRoomCode='GUEST';
    const rooms=[...gs('rooms',[])];
    let room=rooms.find(r=>r.id===guestRoomId);
    if(!room){
      room={id:guestRoomId,code:guestRoomCode,members:[guestUserId],maxMembers:1};
      rooms.push(room);
    }else{
      room={...room,members:[guestUserId],maxMembers:1};
      const idx=rooms.findIndex(r=>r.id===guestRoomId);
      rooms[idx]=room;
    }
    ss('rooms',rooms);
    const users=[...gs('users',[])];
    const guest={id:guestUserId,username:'ゲスト',memberCode:'GUEST',roomId:guestRoomId,isGuest:true};
    const existingIdx=users.findIndex(u=>u.id===guestUserId);
    if(existingIdx>=0)users[existingIdx]=guest;else users.push(guest);
    ss('users',users);
    ss('currentUser',guest);
    onAuth(guest);
  }

  async function submit(){
    setErr('');
    const rawName=form.username.trim();
    if(!rawName){setErr('ユーザー名を入力してください');return;}
    const roomCodeInput=form.roomCode.trim().toUpperCase();
    const profileKey=roomCodeInput?`${roomCodeInput}::${rawName.toLowerCase()}`:'';
    const savedProfile=profileKey?authProfiles[profileKey]||null:null;
    const canReuse=!!savedProfile;
    if(HAS_BACKEND){
      const result=await api('/api/auth/join',{
        username:rawName,
        roomCode:form.roomCode.trim(),
        memberCode:canReuse?savedProfile?.memberCode||'':'',
        userId:canReuse?savedProfile?.id||'':'',
      });
      if(!result?.ok){
        setErr(result?.error||'参加できませんでした');
        return;
      }
      ss('rooms',result.rooms||[]);
      ss('users',result.users||[]);
      if(result.room?.state){
        const state=result.room.state;
        ss(roomDataKey(result.room.id,PREDICTION_STORE_KEY),state.predictionsV2||state.predictions||{});
        ss(roomDataKey(result.room.id,'results'),state.results||{});
        ss(roomDataKey(result.room.id,'locked'),state.locked||{});
        ss(roomDataKey(result.room.id,'koPreds'),state.koPreds||{});
        ss(roomDataKey(result.room.id,'settings'),state.settings||DEFAULT_ROOM_SETTINGS);
      }
      const persisted={
        id:result.user.id,
        username:result.user.username,
        memberCode:result.user.memberCode,
        roomId:result.user.roomId,
        roomCode:result.room?.code||form.roomCode.trim().toUpperCase(),
      };
      const nextProfiles={...authProfiles,[`${persisted.roomCode}::${String(persisted.username||'').toLowerCase()}`]:persisted};
      ss('lastAuthUser',persisted);
      ss('authProfiles',nextProfiles);
      ss('currentUser',result.user);
      onAuth(result.user);
      return;
    }
    const code=(form.roomCode.trim().toUpperCase()||genCode());
    const rooms=[...gs('rooms',[])];
    let room=rooms.find(r=>r.code===code);
    if(!room){
      room={id:'room-'+Date.now(),code,members:[],maxMembers:2};
      rooms.push(room);
    }
    const users=[...gs('users',[])];
    const reuseMemberCode=canReuse?String(savedProfile?.memberCode||'').trim().toUpperCase():'';
    const existing=
      (reuseMemberCode&&users.find(u=>u.memberCode===reuseMemberCode&&u.roomId===room.id))||null;
    if(room.members.length>=2&&!existing){setErr('このルームは満員です');return;}
    let user=existing||null;
    if(user){
      user.username=rawName;
      user.roomId=room.id;
      if(!room.members.includes(user.id))room.members.push(user.id);
    }else{
      let memberCode;
      do{
        memberCode=Math.random().toString(36).slice(2,6).toUpperCase();
      }while(users.some(u=>u.memberCode===memberCode));
      user={id:'u-'+Date.now(),username:rawName,memberCode,roomId:room.id};
      users.push(user);
      if(!room.members.includes(user.id))room.members.push(user.id);
    }
    ss('rooms',rooms);
    ss('users',users);
    const cu={...user,roomId:room.id};
    const persisted={id:cu.id,username:cu.username,memberCode:cu.memberCode,roomId:cu.roomId,roomCode:room.code};
    ss('lastAuthUser',persisted);
    ss('authProfiles',{...authProfiles,[`${room.code}::${String(cu.username||'').toLowerCase()}`]:persisted});
    ss('currentUser',cu);onAuth(cu);
  }

  return(
    <div className="auth-bg">
      <div className="auth-top-title">FIFA WORLD CUP 2026</div>
      <div className="auth-hero">
        <div className="auth-brand">
          <img className="auth-logo-art" src="./WorldCup_logo.png?v=20260419_234500" alt="FIFA WORLD CUP 2026" />
          <div className="auth-overlay messi" aria-hidden="true"></div>
          <div className="auth-overlay haaland" aria-hidden="true"></div>
        </div>
      </div>
      <div className="auth-card">
        <div className="field"><label>ユーザー名</label>
          <input value={form.username} onChange={set('username')} placeholder="例: YAMADA" maxLength={16}/>
        </div>
        <div className="field"><label>ルームコード</label>
          <input value={form.roomCode} onChange={set('roomCode')} placeholder="FIFA26" maxLength={12} style={{letterSpacing:'3px',fontWeight:800,fontSize:18}}/>
        </div>
        <p style={{fontSize:12,color:'var(--text2)',marginBottom:12,lineHeight:1.6}}>1ルーム2人まで入室可。友達同士で試合予想をしよう！</p>
        {err&&<div className="errmsg">{err}</div>}
        <button className="btn" style={{marginTop:12}} onClick={submit}>
          ルームに参加 / 作成
        </button>
        <button className="btn ghost" style={{marginTop:10}} onClick={startGuestMode}>
          ゲストで見る
        </button>
      </div>
    </div>
  );
}

function MatchCard({match,userId,opponentId,preds,results,onSave,roomId,syncToken,readOnly=false}){
  const lang=useContext(LangCtx);const l=T[lang];
  const users=gs('users',[]);
  const myPred=preds[userId]?.[match.id];
  const oppPred=opponentId?preds[opponentId]?.[match.id]:null;
  const result=results[match.id];
  const uiSettings=gs('settings',DEFAULT_UI_SETTINGS);
  const timeZone=uiSettings.timeZone||DEFAULT_UI_SETTINGS.timeZone;
  const locked=gr(roomId,'locked',{});
  const isLocked=(locked[userId]||[]).includes(match.id);
  const [home,setHome]=useState(myPred?.home??0);
  const [away,setAway]=useState(myPred?.away??0);
  const [localLocked,setLocalLocked]=useState(isLocked&&!!myPred);
  const myUserName=users.find((u)=>u.id===userId)?.username||'ユーザー名';
  const oppUserName=users.find((u)=>u.id===opponentId)?.username||'ユーザー名';
  const showTeam=t=>t.startsWith('TBD-')?placeholderLabel(t):teamJa(t);

  useEffect(()=>{
    setHome(myPred?.home??0);
    setAway(myPred?.away??0);
    setLocalLocked(isLocked&&!!myPred);
  },[syncToken,myPred?.home,myPred?.away,isLocked,match.id]);

  function doConfirm(){
    if(readOnly)return;
    onSave(match.id,{home,away});
    const lk=gr(roomId,'locked',{});
    const arr=[...(lk[userId]||[])];
    if(!arr.includes(match.id))arr.push(match.id);
    lk[userId]=arr;sr(roomId,'locked',lk);
    setLocalLocked(true);
  }
  function doUnlock(){
    if(readOnly)return;
    const lk=gr(roomId,'locked',{});
    lk[userId]=(lk[userId]||[]).filter(id=>id!==match.id);
    sr(roomId,'locked',lk);
    setLocalLocked(false);
  }
  function getPts(pred,res){
    if(!pred||!res)return null;
    const s={...DEFAULT_ROOM_SETTINGS,...gr(roomId,'settings',{})};
    if(pred.home===res.home&&pred.away===res.away)return{pts:s.exactPts,type:'exact'};
    const pr=pred.home>pred.away?'H':pred.home<pred.away?'A':'D';
    const rr=res.home>res.away?'H':res.home<res.away?'A':'D';
    return pr===rr?{pts:s.resultPts,type:'result'}:{pts:0,type:'miss'};
  }
  const myScore=myPred&&result?getPts(myPred,result):null;
  return(
    <div className="mcard">
      <div className="mcard-hdr">
        <span>グループ {match.groupId}</span>
        <div style={{display:'flex',alignItems:'center',gap:6}}>
          {localLocked&&<span className="lock-tag">🔒 {l.confirm}済み</span>}
          {result&&<span style={{fontSize:10,background:'var(--goldf)',color:'var(--gold)',fontWeight:800,padding:'2px 8px',borderRadius:20}}>
            結果: {result.home}–{result.away}
          </span>}
        </div>
      </div>
      <div style={{padding:'7px 12px 0',fontSize:10,color:'var(--text2)',fontWeight:700,display:'flex',justifyContent:'space-between',gap:8,flexWrap:'wrap'}}>
        <span>{formatMatchDate(match.date,match.kickoff,timeZone)}</span>
        <span>{stadiumLabel(match.stadium,lang)}</span>
      </div>
      <div className="mcard-body">
        <div className="mteams">
          <div className="mt"><span className="fl"><TeamFlag team={match.home}/></span><div className="nm">{showTeam(match.home)}</div></div>
          <div className="result-display">
            <span className="result-score">{result?.home??'?'}</span>
            <span className="result-dash">–</span>
            <span className="result-score">{result?.away??'?'}</span>
          </div>
          <div className="mt"><span className="fl"><TeamFlag team={match.away}/></span><div className="nm">{showTeam(match.away)}</div></div>
        </div>
        <div className="pred-compare">
          <div className="pred-box me">
            <div className="pred-head">
              <span className="pred-role">自分</span>
              <div className="pred-name">{myUserName}</div>
            </div>
            {(localLocked||readOnly)
              ?<div className="pred-score">
                <div>
                  <div className="pred-value big">{myPred?`${myPred.home}–${myPred.away}`:l.noPred}</div>
                  <div className="pred-note">自分の予想</div>
                </div>
                {myScore&&<div style={{fontSize:11,fontWeight:800,padding:'6px 10px',borderRadius:10,
                  background:myScore.type==='exact'?'var(--goldf)':myScore.type==='result'?'var(--greenf)':'rgba(100,100,100,.08)',
                  color:myScore.type==='exact'?'var(--gold)':myScore.type==='result'?'var(--green)':'var(--text2)',
                  whiteSpace:'nowrap'}}>
                  {myScore.type==='exact'?`⭐ +${myScore.pts}pt`:myScore.type==='result'?`✓ +${myScore.pts}pt`:'✗ +0'}
                </div>}
              </div>
              :<div className="pred-edit">
                <div className="scw">
                  <button className="sarr" onClick={()=>setHome(h=>Math.min(20,h+1))}>▲</button>
                  <div className={`snum${home>0?' active':''}`}>{home}</div>
                  <button className="sarr" onClick={()=>setHome(h=>Math.max(0,h-1))}>▼</button>
                </div>
                <div className="sdiv">–</div>
                <div className="scw">
                  <button className="sarr" onClick={()=>setAway(a=>Math.min(20,a+1))}>▲</button>
                  <div className={`snum${away>0?' active':''}`}>{away}</div>
                  <button className="sarr" onClick={()=>setAway(a=>Math.max(0,a-1))}>▼</button>
                </div>
              </div>
            }
          </div>
          <div className="pred-box opp">
            <div className="pred-head">
              <span className="pred-role">相手</span>
              <div className="pred-name">{oppUserName}</div>
            </div>
            <div className="pred-score">
              <div>
                <div className="pred-value">{oppPred?`${oppPred.home}–${oppPred.away}`:l.noPred}</div>
                <div className="pred-note">相手の予想</div>
              </div>
            </div>
          </div>
        </div>
        <div className="mactions">
          {readOnly
            ?<div className="readonly-note">ゲスト閲覧中のため予想入力はできません</div>
            :localLocked
            ?<button className="ubtn" onClick={doUnlock}>🔓 {l.unlock}</button>
            :<button className="pbtn" onClick={doConfirm}>{l.confirm}</button>
          }
        </div>
      </div>
    </div>
  );
}

function BracketScreen({user,syncToken}){
  const lang=useContext(LangCtx);const l=T[lang];
  const rooms=gs('rooms',[]);
  const room=rooms.find(r=>r.id===user.roomId);
  const roomId=room?.id||user.roomId;
  const users=gs('users',[]);
  const roomUsers=(() => {
    const byId=new Map();
    users.filter((u)=>u.roomId===roomId).forEach((u)=>byId.set(u.id,u));
    (room?.members||[])
      .map((id)=>users.find((u)=>u.id===id))
      .filter(Boolean)
      .forEach((u)=>byId.set(u.id,u));
    if(!byId.size&&user?.roomId===roomId)byId.set(user.id,user);
    return [...byId.values()];
  })();
  const roomMembers=roomUsers.length?roomUsers:[user];
  const opp=roomMembers.find((m)=>m.id!==user.id)||null;
  const oppId=opp?.id||null;
  const [koPreds,setKoPreds]=useState(()=>gr(roomId,'koPreds',{}));
  const [results,setResults]=useState(()=>gr(roomId,'results',{}));
  const [editing,setEditing]=useState(null);
  const [draft,setDraft]=useState(null);
  const [status,setStatus]=useState('');
  const scrollRef=useRef(null);
  const scrollProxyRef=useRef(null);
  const myPreds=koPreds[user.id]||{};
  const oppPreds=oppId?(koPreds[oppId]||{}):{};
  const canEditKo=!user.isGuest;
  const settings={...DEFAULT_ROOM_SETTINGS,...gr(roomId,'settings',{})};
  const boardRounds=KO_ROUNDS.filter((round)=>['R32','R16','QF','SF','F'].includes(round.id));
  const BOARD={x:24,y:50,w:260,h:92,gapX:314,gapY:120};
  const BOARD_WIDTH=BOARD.x+BOARD.gapX*5+BOARD.w+190;
  const BOARD_HEIGHT=BOARD.y+BOARD.gapY*16+230;
  const podium=koPodiumPredictions(myPreds,{});
  const podiumCandidates=koPodiumCandidates(myPreds,results);
  const champion=podium.champion;

  useEffect(()=>{
    setKoPreds(gr(roomId,'koPreds',{}));
    setResults(gr(roomId,'results',{}));
  },[syncToken,roomId]);

  function roundX(roundId){
    if(roundId==='3RD')return BOARD.x + 4 * BOARD.gapX;
    const index=['R32','R16','QF','SF','F'].indexOf(roundId);
    return BOARD.x + Math.max(0,index) * BOARD.gapX;
  }
  function centerY(roundId,index){
    if(roundId==='3RD')return BOARD.y + BOARD.gapY*16 + 66;
    if(roundId==='R32')return BOARD.y + index*BOARD.gapY + BOARD.h/2;
    const meta=KO_SOURCES[roundId];
    if(!meta)return BOARD.y + BOARD.h/2;
    const a=centerY(meta.prev,index*2);
    const b=centerY(meta.prev,index*2+1);
    return (a+b)/2;
  }
  function cardY(roundId,index){return centerY(roundId,index)-BOARD.h/2;}
  function sideY(roundId,index,side){return centerY(roundId,index);}
  function syncBracketScroll(source){
    const scroller=scrollRef.current;
    const proxy=scrollProxyRef.current;
    if(!scroller||!proxy)return;
    if(source==='proxy'){
      if(Math.abs(scroller.scrollLeft-proxy.scrollLeft)>1)scroller.scrollLeft=proxy.scrollLeft;
    }else{
      if(Math.abs(proxy.scrollLeft-scroller.scrollLeft)>1)proxy.scrollLeft=scroller.scrollLeft;
    }
  }
  function matchPoints(match,predsForUser=myPreds){
    const pred=normalizeKoRecord(predsForUser[match.id]);
    const actual=normalizeKoRecord(results[match.id]);
    if(!pred||!actual)return null;
    let pts=0;
    const pw=koRecordWinnerSide(pred), aw=koRecordWinnerSide(actual);
    if(pw&&aw&&pw===aw)pts+=settings.koWinnerPts||0;
    if(koRecordHasScore(pred)&&koRecordHasScore(actual)&&pred.home===actual.home&&pred.away===actual.away)pts+=settings.koExactPts||0;
    if(actual.decidedBy==='PK'&&pred.decidedBy==='PK'&&pw&&aw&&pw===aw)pts+=settings.koPenaltyPts||0;
    return pts;
  }
  function buildDraft(match){
    const current=normalizeKoRecord(myPreds[match.id])||{};
    const inferred=current.winnerSide||inferWinnerSide(current.home,current.away)||'home';
    return {
      home:String(current.home??0),
      away:String(current.away??0),
      winnerSide:inferred,
      decidedBy:current.decidedBy==='PK'?'PK':'REG',
      homePen:String(current.homePen??0),
      awayPen:String(current.awayPen??0),
    };
  }
  function openMatch(round,index){
    if(!canEditKo)return;
    const match=round.matches[index];
    setEditing({roundId:round.id,index,match});
    setDraft(buildDraft(match));
    setStatus('');
  }
  function saveDraft(){
    if(!editing||!draft||!canEditKo)return;
    const home=Math.max(0,Number(draft.home)||0);
    const away=Math.max(0,Number(draft.away)||0);
    const tied=home===away;
    const wantsPk=tied&&draft.decidedBy==='PK';
    const homePen=wantsPk?Math.max(0,Number(draft.homePen)||0):null;
    const awayPen=wantsPk?Math.max(0,Number(draft.awayPen)||0):null;
    const scoreWinner=inferWinnerSide(home,away);
    const pkWinner=wantsPk?inferWinnerSide(homePen,awayPen):null;
    const winnerSide=scoreWinner||pkWinner||draft.winnerSide;
    if(tied&&!winnerSide){setStatus('同点の場合は勝者を選んでください');return;}
    if(wantsPk&&!pkWinner){setStatus('PKの得点差がつくように入力してください');return;}
    const record={
      home,away,
      winnerSide,
      decidedBy:wantsPk?'PK':'REG',
      homePen,awayPen,
      locked:true,
      updatedAt:new Date().toISOString(),
    };
    const next={...koPreds,[user.id]:{...myPreds,[editing.match.id]:record}};
    setKoPreds(next);sr(roomId,'koPreds',next);
    setEditing(null);setDraft(null);setStatus('');
  }
  function clearDraft(){
    if(!editing||!canEditKo)return;
    const userKo={...(koPreds[user.id]||{})};
    delete userKo[editing.match.id];
    const next={...koPreds,[user.id]:userKo};
    setKoPreds(next);sr(roomId,'koPreds',next);
    setEditing(null);setDraft(null);setStatus('');
  }
  function updatePodium(key,value){
    if(!canEditKo)return;
    const nextUserPreds={...myPreds,_podium:{...(myPreds._podium||{}),[key]:value}};
    if(!value)delete nextUserPreds._podium[key];
    const next={...koPreds,[user.id]:nextUserPreds};
    setKoPreds(next);sr(roomId,'koPreds',next);
  }
  function renderLines(){
    const lines=[];
    ['R32','R16','QF','SF'].forEach((roundId)=>{
      const round=koGetRound(roundId);
      const nextRoundId={R32:'R16',R16:'QF',QF:'SF',SF:'F'}[roundId];
      round.matches.forEach((match,index)=>{
        const winnerSide=koWinnerSideForMatch(match,myPreds,results);
        const targetIndex=Math.floor(index/2);
        const targetSide=index%2===0?'home':'away';
        const x1=roundX(roundId)+BOARD.w;
        const y1=winnerSide?sideY(roundId,index,winnerSide):centerY(roundId,index);
        const x2=roundX(nextRoundId);
        const y2=sideY(nextRoundId,targetIndex,targetSide);
        const mid=x1+(x2-x1)/2;
        lines.push(<path key={`${roundId}-${index}`} className={`ko-line${winnerSide?' on':''}`} d={`M ${x1} ${y1} H ${mid} V ${y2} H ${x2}`}/>);
      });
    });
    const finalMatch=koGetMatch('F',0);
    const finalWinner=koWinnerSideForMatch(finalMatch,myPreds,results);
    const finalX=roundX('F')+BOARD.w;
    const finalY=finalWinner?sideY('F',0,finalWinner):centerY('F',0);
    lines.push(<path key="champion-line" className={`ko-line champion${finalWinner?' on':''}`} d={`M ${finalX} ${finalY} H ${finalX+150}`}/>);
    [0,1].forEach((index)=>{
      const match=koGetMatch('SF',index);
      const winnerSide=koWinnerSideForMatch(match,myPreds,results);
      const loserSide=winnerSide==='home'?'away':winnerSide==='away'?'home':null;
      const x1=roundX('SF')+BOARD.w;
      const y1=loserSide?sideY('SF',index,loserSide):centerY('SF',index);
      const x2=roundX('F');
      const y2=sideY('3RD',0,index===0?'home':'away');
      const mid=x1+(x2-x1)/2;
      lines.push(<path key={`third-${index}`} className="ko-line third" d={`M ${x1} ${y1} H ${mid} V ${y2} H ${x2}`}/>);
    });
    return lines;
  }
  function renderTeamBlock(roundId,index,side,label,winnerSide){
    const isWinner=winnerSide===side;
    return(
      <div className={`ko-team-block${isWinner?' win':''}`} key={side}>
        <span className="ko-team-flag"><TeamFlag team={label}/></span>
        <span className="ko-team-name">{koTeamName(label)}</span>
        {isWinner&&<span className="ko-win-mark">勝</span>}
      </div>
    );
  }
  function renderActualScore(record){
    return (
      <div className={`ko-actual-score${record?' on':''}`}>
        {record?koRecordScoreText(record):'VS'}
      </div>
    );
  }
  function renderPredictionLine(kind,label,record,pts=null){
    return(
      <div className={`ko-pred-line ${kind}`} key={kind}>
        <b>{label}</b>
        <strong>{koRecordScoreText(record)}</strong>
        {pts!==null&&<em>+{pts}pt</em>}
      </div>
    );
  }
  function renderRoundLabels(){
    return [
      {id:'R32',label:'R32'},
      {id:'R16',label:'R16'},
      {id:'QF',label:'準々決勝'},
      {id:'SF',label:'準決勝'},
      {id:'F',label:'決勝',sub:'（3位決定戦）',final:true},
    ].map((round)=>(
      <div
        key={`round-label-${round.id}`}
        className={`ko-round-label${round.final?' final':''}`}
        style={{left:roundX(round.id),width:BOARD.w}}
      >
        <span>{round.label}</span>
        {round.sub&&<small>{round.sub}</small>}
      </div>
    ));
  }
  function renderRoundGuides(){
    return ['R32','R16','QF','SF','F'].map((roundId)=>(
      <div
        key={`round-guide-${roundId}`}
        className="ko-round-guide"
        style={{left:roundX(roundId)+BOARD.w/2}}
      ></div>
    ));
  }
  function renderMatch(round,index){
    const match=round.matches[index];
    const actual=normalizeKoRecord(results[match.id]);
    const pred=normalizeKoRecord(myPreds[match.id]);
    const oppPred=oppId?normalizeKoRecord(oppPreds[match.id]):null;
    const active=actual||pred;
    const winnerSide=koRecordWinnerSide(active);
    const homeLabel=koResolvedTeam(round.id,index,'home',myPreds,results)||match.home;
    const awayLabel=koResolvedTeam(round.id,index,'away',myPreds,results)||match.away;
    const pts=matchPoints(match,myPreds);
    return(
      <button
        key={match.id}
        className={`ko-match-node ${round.id.toLowerCase()}${actual?' actual':pred?' predicted':''}${canEditKo?'':' readonly'}`}
        style={{left:roundX(round.id),top:cardY(round.id,index),width:BOARD.w,height:BOARD.h}}
        onClick={()=>openMatch(round,index)}
        disabled={!canEditKo}
      >
        <div className="ko-teams-line">
          {renderTeamBlock(round.id,index,'home',homeLabel,winnerSide)}
          {renderActualScore(actual)}
          {renderTeamBlock(round.id,index,'away',awayLabel,winnerSide)}
        </div>
        <div className="ko-score-stack">
          {renderPredictionLine('me','自分',pred,pts)}
          {renderPredictionLine('opp','相手',oppId?oppPred:null,null)}
        </div>
      </button>
    );
  }

  return(
    <div className="page page-enter">
      <div className="ko-nav-spacer" aria-hidden="true"></div>
      <div className="ko-podium-panel">
        <div className="ko-podium-grid">
          {[
            {key:'champion',label:'優勝予想',enabled:true,points:settings.koChampionPts},
            {key:'runnerUp',label:'2位予想',enabled:settings.koRunnerUpEnabled,points:settings.koRunnerUpPts},
            {key:'third',label:'3位予想',enabled:settings.koThirdPlaceEnabled,points:settings.koThirdPlacePts},
          ].map(item=>(
            <div className={`ko-podium-pick${item.enabled?'':' off'}`} key={item.key}>
              <div className="ko-podium-label"><span>{item.label}</span></div>
              <select
                value={podium[item.key]||''}
                disabled={!item.enabled||!canEditKo}
                onChange={(e)=>updatePodium(item.key,e.target.value)}
              >
                <option value="">{item.enabled?'未選択':'設定で無効'}</option>
                {podiumCandidates.map(candidate=><option key={`${item.key}-${candidate}`} value={candidate}>{koTeamName(candidate)}</option>)}
              </select>
              <div className="ko-podium-note">{!item.enabled?'採点しない場合はこのままでOK':canEditKo?`的中で +${item.points}pt`:'ゲストは閲覧のみ'}</div>
            </div>
          ))}
        </div>
      </div>
      <div className="ko-scroll" ref={scrollRef} onScroll={()=>syncBracketScroll('board')}>
        <div className="ko-canvas" style={{width:BOARD_WIDTH,height:BOARD_HEIGHT}}>
          {renderRoundGuides()}
          <svg className="ko-lines" width="100%" height="100%" viewBox={`0 0 ${BOARD_WIDTH} ${BOARD_HEIGHT}`} preserveAspectRatio="none">
            {renderLines()}
          </svg>
          {renderRoundLabels()}
          {boardRounds.map((round)=>round.matches.map((m,i)=>renderMatch(round,i)))}
          {KO_ROUNDS.find(r=>r.id==='3RD').matches.map((m,i)=>renderMatch(KO_ROUNDS.find(r=>r.id==='3RD'),i))}
          <div className={`ko-champion-node${champion?' on':''}`} style={{left:roundX('F')+BOARD.w+124,top:centerY('F',0)-54}}>
            <span>優勝</span>
            <strong>{champion?<><TeamFlag team={champion}/> {koTeamName(champion)}</>:'未定'}</strong>
          </div>
        </div>
      </div>
      {ReactDOM.createPortal(
        <div className="ko-scrollbar-proxy" ref={scrollProxyRef} onScroll={()=>syncBracketScroll('proxy')} aria-label="決勝トーナメント表の横スクロール">
          <div style={{width:BOARD_WIDTH,height:1}}></div>
        </div>,
        document.body
      )}
      {editing&&draft&&(
        <div className="ko-modal-backdrop" onClick={()=>setEditing(null)}>
          <div className="ko-modal" onClick={(e)=>e.stopPropagation()}>
            <div className="ko-modal-head">
              <div>
                <span>{koGetRound(editing.roundId)?.label} / {editing.match.id}</span>
                <h3>予想を入力</h3>
              </div>
              <button onClick={()=>setEditing(null)}>閉じる</button>
            </div>
            <div className="ko-modal-teams">
              {['home','away'].map((side)=>(
                <div className="ko-modal-team" key={side}>
                  <TeamFlag team={koResolvedTeam(editing.roundId,editing.index,side,myPreds,results)||editing.match[side]}/>
                  <span>{koTeamName(koResolvedTeam(editing.roundId,editing.index,side,myPreds,results)||editing.match[side])}</span>
                </div>
              ))}
            </div>
            <div className="ko-score-editor">
              <input type="number" min="0" value={draft.home} onChange={(e)=>setDraft({...draft,home:e.target.value})}/>
              <span>-</span>
              <input type="number" min="0" value={draft.away} onChange={(e)=>setDraft({...draft,away:e.target.value})}/>
            </div>
            <div className="ko-pick-row">
              {['home','away'].map(side=>(
                <button key={side} className={draft.winnerSide===side?'on':''} onClick={()=>setDraft({...draft,winnerSide:side})}>
                  {side==='home'?'左側':'右側'}が勝利
                </button>
              ))}
            </div>
            <label className="ko-pk-toggle">
              <input type="checkbox" checked={draft.decidedBy==='PK'} onChange={(e)=>setDraft({...draft,decidedBy:e.target.checked?'PK':'REG'})}/>
              PK戦で決着
            </label>
            {draft.decidedBy==='PK'&&(
              <div className="ko-score-editor pk">
                <input type="number" min="0" value={draft.homePen} onChange={(e)=>setDraft({...draft,homePen:e.target.value})}/>
                <span>PK</span>
                <input type="number" min="0" value={draft.awayPen} onChange={(e)=>setDraft({...draft,awayPen:e.target.value})}/>
              </div>
            )}
            {status&&<div className="errmsg">{status}</div>}
            <div className="ko-modal-actions">
              <button className="ghost" onClick={clearDraft}>クリア</button>
              <button className="primary" onClick={saveDraft}>保存</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

function LeaderboardScreen({user,onOpenTeam}){
  const lang=useContext(LangCtx);const l=T[lang];
  const [query,setQuery]=useState('');
  const [countryFilter,setCountryFilter]=useState('all');
  const players=[...ALL_PLAYERS];
  const countries=[...GROUP_TEAM_KEYS].sort((a,b)=>teamJa(a).localeCompare(teamJa(b),'ja'));
  const queryNorm=normalizeSearchText(query);
  const filteredPlayers=players.filter((p)=>{
    if(countryFilter!=='all'&&p.country!==countryFilter)return false;
    if(!queryNorm)return true;
      const hay=normalizeSearchText([
      p.name,
      p.displayNameJa,
      p.countryJa||teamJa(p.country),
      p.country,
      p.position,
      p.club,
      p.goals,
      p.clubGoals,
    ].join(' '));
    return hay.includes(queryNorm);
  }).sort((a,b)=>b.goals-a.goals||playerDisplayName(a).localeCompare(playerDisplayName(b),'ja'));
  const top=[...filteredPlayers].sort((a,b)=>b.goals-a.goals||playerDisplayName(a).localeCompare(playerDisplayName(b),'ja'))[0]
    ||[...players].sort((a,b)=>b.goals-a.goals||b.clubGoals-a.clubGoals||playerDisplayName(a).localeCompare(playerDisplayName(b),'ja'))[0];
  const uiSettings=gs('settings',DEFAULT_UI_SETTINGS);
  const dataStamp=PLAYER_DATA_META.generatedAt ? formatTimestamp(PLAYER_DATA_META.generatedAt,uiSettings.timeZone) : '';

  return(
    <div className="page page-enter">
      <div className="shdr"><h2>得点ランキング(未)</h2></div>
      <div className="lb-hero">
        <div className="lb-bg-txt">W杯</div>
        <div className="lb-label">ワールドカップ得点</div>
        {dataStamp&&<div style={{fontSize:10,color:'rgba(255,255,255,.68)',marginTop:4}}>公開データ更新: {dataStamp}</div>}
        <div className="lb-vs-row" style={{gridTemplateColumns:'1fr'}}>
          <div className="lb-pl">
            <div className="lb-pl-name">トップスコアラー</div>
            <div className="lb-pl-pts">{top?.goals??0}</div>
            <div style={{fontSize:9,color:'rgba(255,255,255,.6)',marginTop:2}}>{playerDisplayName(top)||'--'}</div>
          </div>
        </div>
        <div style={{fontSize:10,color:'rgba(255,255,255,.68)',marginTop:8}}>対象国数: {GROUP_TEAM_KEYS.length}</div>
      </div>
      <div className="rank-tools">
        <input
          className="rank-search"
          value={query}
          onChange={(e)=>setQuery(e.target.value)}
          placeholder="選手名・国名・クラブ・ポジションで検索"
        />
      </div>
      <div className="rank-tools" style={{paddingTop:8}}>
        <div className="filter-wrap">
          <button className={`filter-chip${countryFilter==='all'?' on':''}`} onClick={()=>setCountryFilter('all')}>全て</button>
          {countries.map(country=>(
            <button
              key={country}
              className={`filter-chip${countryFilter===country?' on':''}`}
              onClick={()=>setCountryFilter(country)}
            >
              <TeamFlag team={country}/> {teamJa(country)}
            </button>
          ))}
        </div>
      </div>
      <div className="rank-meta">
        <span>表示 {filteredPlayers.length} / {players.length}</span>
        <span>{countryFilter==='all'?'国フィルタなし':teamJa(countryFilter)}</span>
      </div>
      <div className="section-title">選手一覧</div>
      <div className="rank-list">
        {filteredPlayers.length===0&&<div style={{padding:24,textAlign:'center',color:'var(--text2)',fontSize:13}}>条件に合う選手がいません</div>}
        {filteredPlayers.map((p,i)=>(
          <div className="rank-card" key={p.id}>
            <div className="rank-card-top">
              <div className="rank-card-left">
                <div className="rank-card-rank">#{i+1}</div>
                <div className="rank-card-name">{playerDisplayName(p)}</div>
                <div className="rank-card-meta">
                  <button className="rank-country" onClick={()=>onOpenTeam?.(p.country)}><TeamFlag team={p.country}/> <span>{teamJa(p.country)}</span></button>
                  <span>{positionJa(p.position)}</span>
                  <span>{p.club}</span>
                </div>
              </div>
              <div style={{textAlign:'right'}}>
                <div className="rank-score">{p.goals}</div>
                <div className="rank-score-sub">W杯得点</div>
              </div>
            </div>
          </div>
        ))}
      </div>
      <div style={{height:20}}/>
    </div>
  );
}

const BG_THEME_SWATCHES=[
  {id:'cream',color:'#f2ede4',label:'クリーム'},
  {id:'sky',color:'#e8f0fb',label:'スカイ'},
  {id:'sakura',color:'#fdf0f5',label:'さくら'},
  {id:'mint',color:'#edf7f3',label:'ミント'},
  {id:'dark',color:'#0d1526',label:'ダーク'},
];

function SettingsScreen({user,syncToken,onRenameUser}){
  const lang=useContext(LangCtx);const l=T[lang];
  const rooms=gs('rooms',[]);
  const room=rooms.find(r=>r.id===user.roomId);
  const roomId=room?.id||user.roomId;
  const [pointSettings,setPointSettings]=useState(()=>({...DEFAULT_ROOM_SETTINGS,...gr(roomId,'settings',{})}));
  const [uiSettings,setUiSettings]=useState(()=>gs('settings',DEFAULT_UI_SETTINGS));
  const [nameDraft,setNameDraft]=useState(user?.username||'');
  const [savingName,setSavingName]=useState(false);
  const [toast,setToast]=useState('');

  useEffect(()=>{
    setPointSettings({...DEFAULT_ROOM_SETTINGS,...gr(roomId,'settings',{})});
  },[syncToken,roomId]);
  useEffect(()=>{
    setNameDraft(user?.username||'');
  },[user?.id,user?.username]);

  function updUiSetting(k,v){
    const u={...uiSettings,[k]:v};
    setUiSettings(u);ss('settings',u);
    if(k==='bgTheme'){applyTheme(v);}
    if(k==='accentColor'){applyAccent(v);window.parent.postMessage({type:'__edit_mode_set_keys',edits:{accentColor:v}},'*');}
    notifyStateChange();
  }
  function updPointSetting(k,v){
    const u={...pointSettings,[k]:v};
    setPointSettings(u);sr(roomId,'settings',u);
  }
  function changePts(k,delta){
    updPointSetting(k,Math.max(0,Math.min(10,(pointSettings[k]||0)+delta)));
  }
  async function saveName(){
    const nextName=String(nameDraft||'').trim();
    if(!nextName){setToast('ユーザー名を入力してください');return;}
    if(nextName===String(user?.username||'').trim()){setToast('変更はありません');return;}
    setSavingName(true);
    try{
      const result=await onRenameUser?.(nextName);
      if(!result?.ok){
        setToast(result?.error||'変更できませんでした');
        return;
      }
      setToast('ユーザー名を更新しました');
    }finally{
      setSavingName(false);
    }
  }
  return(
    <div className="page page-enter">
      <div className="shdr"><h2>{l.settings}</h2><p>設定</p></div>
      {toast&&<Toast msg={toast} onDone={()=>setToast('')}/>}
      <div className="set-sec">
        <h3>👤 ユーザー名</h3>
        <div className="player-field" style={{marginTop:0}}>
          <label>表示名</label>
          <input value={nameDraft} onChange={(e)=>setNameDraft(e.target.value)} placeholder="ユーザー名" />
        </div>
        <div className="set-row" style={{borderBottom:'none',paddingTop:10,justifyContent:'flex-start',gap:10,alignItems:'center'}}>
          <button className="btn" style={{width:'auto',padding:'10px 18px'}} onClick={saveName} disabled={savingName}>{savingName?'保存中…':'保存'}</button>
          <div style={{fontSize:12,color:'var(--text2)',lineHeight:1.4}}>ログイン中の表示名を変更します。次回ログイン時にも反映されます。</div>
        </div>
      </div>
      <div className="set-sec">
        <h3>🎨 {l.bgTheme}</h3>
        <div className="set-row" style={{flexDirection:'column',alignItems:'flex-start',gap:12}}>
          <div className="bg-picker">
            {BG_THEME_SWATCHES.map(s=>(
              <div key={s.id} title={s.label}
              className={`bg-swatch${uiSettings.bgTheme===s.id?' on':''}`}
              style={{background:s.color,border:'2px solid '+(uiSettings.bgTheme===s.id?'var(--accent)':'var(--border)')}}
              onClick={()=>updUiSetting('bgTheme',s.id)}/>
            ))}
          </div>
        </div>
      </div>
      <div className="set-sec">
        <h3>🕒 日時表示</h3>
        <div className="set-row" style={{flexDirection:'column',alignItems:'flex-start',gap:12}}>
          <div className="timezone-select">
            {DISPLAY_TIME_ZONES.map(z=>(
              <button
                key={z.id}
                className={`timezone-chip${uiSettings.timeZone===z.id?' on':''}`}
                onClick={()=>updUiSetting('timeZone',z.id)}
              >
                <span className="tz-main">{z.label}</span>
                <span className="tz-sub">{currentTimeInZone(z.id)}</span>
              </button>
            ))}
          </div>
          <div style={{fontSize:12,color:'var(--text2)',lineHeight:1.5}}>
            現在は {timeZoneLabel(uiSettings.timeZone)}（{currentTimeInZone(uiSettings.timeZone)}）表示です。試合日付や更新時刻がこの地域基準で表示されます。
          </div>
        </div>
      </div>
      <div className="set-sec">
        <h3>🧹 データ管理</h3>
        <div className="set-row" style={{flexDirection:'column',alignItems:'flex-start',gap:10}}>
          <div className="sl">予想データを一括削除<span>勝敗予想・得点結果・ロックを消去します</span></div>
          <button className="btn ghost" style={{width:'auto',marginTop:0,color:'var(--red)',borderColor:'var(--red)'}} onClick={()=>{
            if(confirm('予想データをすべて削除しますか？')){clearCompetitionData(roomId);setToast('予想データを削除しました');}
          }}>全データをクリア</button>
        </div>
      </div>
      <div className="set-sec">
        <h3>🏁 結果確定</h3>
        <div className="set-row" style={{flexDirection:'column',alignItems:'flex-start',gap:8}}>
          <div className="sl">確定トリガー<span>試合結果が `results` に入った瞬間に、勝敗とスコアを判定してポイントを再計算します。</span></div>
          <div style={{fontSize:12,color:'var(--text2)',lineHeight:1.6}}>
            いま表示される「結果確定」は、その試合の実スコアが保存された状態を意味します。
          </div>
        </div>
      </div>
      <div className="set-sec point-sec">
        <h3>🎯 {l.pointSettings}</h3>
        <>
          <div className="set-row">
            <div className="sl">グループリーグ 勝敗的中<span>グループリーグの勝敗予想が当たった場合</span></div>
            <div className="pts-ctrl">

// ===== TWEAKS PANEL =====
const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "accentColor": "blue",
  "bgTheme": "cream"
}/*EDITMODE-END*/;

function TweaksPanel(){
  const lang=useContext(LangCtx);
  const [t,setT]=useState(()=>({...TWEAK_DEFAULTS,...gs('tweaks',{})}));
  function set(k,v){
    const n={...t,[k]:v};setT(n);ss('tweaks',n);
    if(k==='accentColor'){applyAccent(v);window.parent.postMessage({type:'__edit_mode_set_keys',edits:{accentColor:v}},'*');}
    if(k==='bgTheme'){applyTheme(v);}
  }
  const accents=[{id:'blue',label:'ブルー'},{id:'red',label:'レッド'},{id:'purple',label:'パープル'},{id:'teal',label:'ティール'},{id:'orange',label:'オレンジ'}];
  return(
    <div className="tweaks-panel">
      <h4>⚡ Tweaks</h4>
      <div className="tw-row">
        <span className="tw-lbl">アクセント</span>
        <div className="tw-opts">
          {accents.map(a=><button key={a.id} className={`tw-opt${t.accentColor===a.id?' on':''}`} onClick={()=>set('accentColor',a.id)}>{a.label}</button>)}
        </div>
      </div>
      <div className="tw-row">
        <span className="tw-lbl">背景テーマ</span>
        <div className="tw-opts">
          {BG_THEME_SWATCHES.map(s=><button key={s.id} className={`tw-opt${t.bgTheme===s.id?' on':''}`} onClick={()=>set('bgTheme',s.id)}>{s.label}</button>)}
        </div>
      </div>
    </div>
  );
}

// ===== APP =====
function App(){
  const [user,setUser]=useState(()=>gs('currentUser',null));
  const [screen,setScreen]=useState('home');
  const [tweaksOpen,setTweaksOpen]=useState(false);
  const [lang]=useState('ja');
  const [selectedTeam,setSelectedTeam]=useState(null);
  const [syncTick,setSyncTick]=useState(0);

  useEffect(()=>{
    const handler=e=>{
      if(e.data?.type==='__activate_edit_mode')setTweaksOpen(true);
      if(e.data?.type==='__deactivate_edit_mode')setTweaksOpen(false);
    };
    const syncHandler=()=>setSyncTick(t=>t+1);
    window.addEventListener('message',handler);
    window.addEventListener('wc26-sync',syncHandler);
    window.parent.postMessage({type:'__edit_mode_available'},'*');
    // Apply saved theme & accent
    const saved=gs('settings',DEFAULT_UI_SETTINGS);
    applyTheme(saved.bgTheme||'cream');
    applyAccent(saved.accentColor||'blue');
    return()=>{
      window.removeEventListener('message',handler);
      window.removeEventListener('wc26-sync',syncHandler);
    };
  },[]);

  useEffect(()=>{
    refreshPlayerDataView();
    setSyncTick(t=>t+1);
  },[user?.roomId,user?.id]);

  useEffect(()=>{
    if(!HAS_BACKEND||!user?.roomId||user?.isGuest)return;
    let alive=true;
    const sync=async()=>{
      try{
        const res=await fetch(`/api/room/${encodeURIComponent(user.roomId)}`);
        if(!res.ok)return;
        const data=await res.json();
        if(!alive)return;
        if(Array.isArray(data.rooms))ss('rooms',data.rooms);
        if(Array.isArray(data.users))ss('users',data.users);
        if(data.playersByCountry&&Object.keys(data.playersByCountry).length){
          setPlayerData(data.playersByCountry,{
            generatedAt:data.generatedAt||PLAYER_DATA_META.generatedAt,
            sources:data.sources||PLAYER_DATA_META.sources,
          },false);
        }
        const roomState=data.room?.state||data.roomState;
        const roomId=data.room?.id||user.roomId;
        if(roomState){
          ss(roomDataKey(roomId,PREDICTION_STORE_KEY),roomState.predictionsV2||roomState.predictions||{});
          ss(roomDataKey(roomId,'results'),roomState.results||{});
          ss(roomDataKey(roomId,'locked'),roomState.locked||{});
          ss(roomDataKey(roomId,'koPreds'),roomState.koPreds||{});
          ss(roomDataKey(roomId,'settings'),roomState.settings||DEFAULT_ROOM_SETTINGS);
        }
        setSyncTick(t=>t+1);
      }catch{}
    };
    sync();
    const timer=setInterval(sync,4000);
    return()=>{alive=false;clearInterval(timer);};
  },[user?.roomId]);

  function handleLogout(){
    const current=gs('currentUser',null);
    if(current?.isGuest){
      ss('currentUser',null);
      setUser(null);
      return;
    }
    if(current){
      ss('lastAuthUser',{id:current.id,username:current.username,memberCode:current.memberCode,roomId:current.roomId,roomCode:(gs('rooms',[]).find(r=>r.id===current.roomId)?.code)||''});
    }
    ss('currentUser',null);
    setUser(null);
  }

  async function handleRenameUser(nextUsername){
    const current=gs('currentUser',null);
    const nextName=String(nextUsername||'').trim();
    if(!current?.id) return {ok:false,error:'ユーザーが見つかりません'};
    if(!nextName) return {ok:false,error:'ユーザー名を入力してください'};
    if(String(current.username||'').trim()===nextName) return {ok:true,user:current};

    if(HAS_BACKEND&&!current.isGuest){
      const res=await api('/api/auth/rename',{roomId:current.roomId,userId:current.id,username:nextName});
      if(!res?.ok) return {ok:false,error:res?.error||'変更できませんでした'};
      if(Array.isArray(res.rooms))ss('rooms',res.rooms);
      if(Array.isArray(res.users))ss('users',res.users);
      const updated=res.user||{...current,username:nextName};
      updateLocalUserRecord(updated,current.username);
      setUser(updated);
      return {ok:true,user:updated};
    }

    const updated=updateLocalUserRecord({...current,username:nextName},current.username);
    setUser(updated);
    return {ok:true,user:updated};
  }

  if(!user){
    return(
      <LangCtx.Provider value={lang}>
        <div className="shell"><AuthScreen onAuth={u=>{setUser(u);}}/></div>
      </LangCtx.Provider>
    );
  }

  const rooms=gs('rooms',[]);
  const room=rooms.find(r=>r.id===user.roomId);

  const screens={
    home:<HomeScreen user={user} onLogout={handleLogout} syncToken={syncTick}/>,
    groups:<GroupsScreen user={user} onOpenTeam={setSelectedTeam} syncToken={syncTick}/>,
    bracket:<BracketScreen user={user} syncToken={syncTick}/>,
    leaderboard:<LeaderboardScreen user={user} onOpenTeam={setSelectedTeam} syncToken={syncTick}/>,
    settings:<SettingsScreen user={user} syncToken={syncTick} onRenameUser={handleRenameUser}/>,
  };

  return(
    <LangCtx.Provider value={lang}>
      <div className="shell">
        {screens[screen]}
        <BottomNav screen={screen} setScreen={setScreen}/>
        {tweaksOpen&&<TweaksPanel/>}
        {selectedTeam&&<CountryModal team={selectedTeam} onClose={()=>setSelectedTeam(null)}/>}
      </div>
    </LangCtx.Provider>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
