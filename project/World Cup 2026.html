<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>⚽ FIFA WORLD CUP 2026</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
:root{
  --bg:#f2ede4;--s1:#ffffff;--s2:#f7f3ec;--s3:#ebe5d8;
  --accent:#1e6ef0;--accentf:rgba(30,110,240,0.10);
  --gold:#d4960a;--goldf:rgba(212,150,10,0.10);
  --green:#16a34a;--greenf:rgba(22,163,74,0.10);
  --red:#dc2626;
  --text:#1c1e2e;--text2:#7a7886;--border:rgba(0,0,0,0.09);--r:14px;
  --shadow:0 2px 12px rgba(0,0,0,0.08);
}
html,body{background:#ddd8ce;color:var(--text);font-family:'Inter',sans-serif;min-height:100%;overflow:auto;}
#root{min-height:100dvh;display:flex;justify-content:center;align-items:stretch;}
.shell{width:min(100%,1440px);height:100dvh;display:flex;flex-direction:column;position:relative;overflow:visible;background:var(--bg);}
.display{font-family:'Bebas Neue',sans-serif;letter-spacing:.03em;}
.page{flex:1;overflow-y:auto;overflow-x:hidden;padding-bottom:96px;-webkit-overflow-scrolling:touch;scrollbar-width:none;}
.page::-webkit-scrollbar{display:none;}
.page-enter{animation:pgIn .3s cubic-bezier(.22,1,.36,1) both;}
@keyframes pgIn{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:none}}
/* AUTH */
.auth-bg{
  width:100%;
  min-height:100%;
  background:
    radial-gradient(circle at 20% 18%, rgba(255,255,255,.62) 0, rgba(255,255,255,0) 34%),
    radial-gradient(circle at 82% 22%, rgba(255,255,255,.38) 0, rgba(255,255,255,0) 28%),
    linear-gradient(155deg,var(--bg) 0%,var(--s3) 100%);
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:24px;
  padding:28px 20px 108px;
  position:relative;
  overflow:hidden;
}
.auth-top-title{
  width:100%;
  text-align:center;
  font-family:'Bebas Neue',sans-serif;
  font-size:22px;
  line-height:1;
  letter-spacing:.18em;
  color:var(--text);
  padding-top:2px;
}
.auth-hero{
  position:relative;
  width:min(100%,780px);
  display:flex;
  justify-content:center;
  z-index:1;
}
.auth-brand{
  position:relative;
  width:fit-content;
  max-width:100%;
  aspect-ratio:auto;
  display:grid;
  justify-items:center;
  margin:0 auto;
}
.auth-logo-art{
  width:clamp(280px,34vw,620px);
  max-width:100%;
  height:auto;
  display:block;
  position:relative;
  z-index:1;
}
.auth-overlay{
  position:absolute;
  top:50%;
  width:clamp(120px,13vw,200px);
  height:clamp(120px,13vw,200px);
  background-repeat:no-repeat;
  background-size:contain;
  background-position:center;
  opacity:1;
  pointer-events:none;
  filter:
    drop-shadow(0 0 2px rgba(255,255,255,.9))
    drop-shadow(0 14px 22px rgba(0,0,0,.12));
  z-index:3;
}
.auth-overlay.messi{
  left:calc(50% - clamp(88px, 8vw, 150px));
  transform:translate(-50%, -50%) scale(1.02);
  background-image:url('./messi.png?v=20260419_234500');
}
.auth-overlay.haaland{
  left:calc(50% + clamp(88px, 8vw, 150px));
  transform:translate(-50%, -50%) scale(1.15);
  background-image:url('./Haaland.png?v=20260419_234500');
}
.auth-logo{
  position:relative;
  text-align:center;
}
.auth-title-line{display:none;}
.auth-caption{display:none;}
.wc-chip{display:none;}
.auth-logo h1{display:none;}
.auth-logo h1 .hl{color:var(--accent);}
.auth-logo p{display:none;}
.auth-card{grid-area:card;position:relative;z-index:1;width:100%;max-width:420px;background:var(--s1);border:1px solid var(--border);border-radius:20px;padding:24px;box-shadow:var(--shadow);}
.auth-tabs{display:flex;gap:4px;background:var(--bg);border-radius:10px;padding:4px;margin-bottom:22px;}
.atab{flex:1;padding:10px;border:none;background:transparent;color:var(--text2);font-size:13px;font-weight:700;border-radius:7px;cursor:pointer;transition:all .2s;font-family:inherit;}
.atab.on{background:var(--s1);color:var(--text);box-shadow:var(--shadow);}
.field{margin-bottom:14px;}
.field label{display:block;font-size:11px;font-weight:700;color:var(--text2);margin-bottom:6px;letter-spacing:.5px;}
.field input{width:100%;padding:12px 16px;background:var(--s2);border:1.5px solid var(--border);border-radius:10px;color:var(--text);font-size:15px;font-family:inherit;outline:none;transition:border-color .2s;}
.field input:focus{border-color:var(--accent);}
.field input::placeholder{color:var(--text2);}
.btn{width:100%;padding:14px;border:none;background:var(--accent);color:#fff;font-size:15px;font-weight:800;border-radius:12px;cursor:pointer;font-family:inherit;transition:all .2s;margin-top:4px;letter-spacing:.3px;}
.btn:hover{opacity:.88;transform:translateY(-1px);}
.btn:active{transform:none;}
.btn.ghost{background:transparent;border:1.5px solid var(--border);color:var(--text2);font-weight:600;font-size:14px;margin-top:8px;}
.btn.ghost:hover{border-color:var(--text2);color:var(--text);}
.btn.ghost.danger{border-color:var(--red);color:var(--red);}
.btn.ghost.danger:hover{background:var(--red);border-color:var(--red);color:#fff;}
.divlabel{display:flex;align-items:center;gap:10px;margin:14px 0;color:var(--text2);font-size:12px;}
.divlabel::before,.divlabel::after{content:'';flex:1;height:1px;background:var(--border);}
.errmsg{color:var(--red);font-size:12px;margin-top:8px;text-align:center;font-weight:600;}
/* NAV */
.bnav{display:flex;background:var(--s1);border-top:1px solid var(--border);padding:6px 0 calc(6px + env(safe-area-inset-bottom));box-shadow:0 -2px 12px rgba(0,0,0,0.06);}
.nitem{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:6px 0;cursor:pointer;border:none;background:transparent;color:var(--text2);transition:color .2s;font-family:inherit;}
.nitem.on{color:var(--accent);}
.nicon{font-size:19px;line-height:1;}
.nlabel{font-size:9px;font-weight:700;letter-spacing:.3px;}
/* HEADER */
.shdr{padding:14px 18px 10px;background:var(--s1);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:10;box-shadow:0 2px 8px rgba(0,0,0,0.04);}
.shdr h2{font-size:20px;font-weight:900;}
.shdr p{font-size:11px;color:var(--text2);margin-top:2px;}
/* HOME */
.home-hero{background:var(--accent);padding:24px 18px 20px;position:relative;overflow:hidden;}
.home-hero::before,.home-hero::after{
  content:'';
  position:absolute;
  width:clamp(180px,20vw,280px);
  height:clamp(180px,20vw,280px);
  background-repeat:no-repeat;
  background-size:contain;
  background-position:center;
  opacity:.24;
  pointer-events:none;
  filter:drop-shadow(0 12px 24px rgba(0,0,0,.12));
}
.home-hero::before{left:-46px;bottom:-18px;background-image:url('./messi.png?v=20260419_234500');transform:rotate(-10deg);}
.home-hero::after{right:-42px;top:-10px;background-image:url('./Haaland.png?v=20260419_234500');transform:rotate(10deg);}
.hero-bg-num{position:absolute;right:-10px;top:-20px;font-family:'Bebas Neue';font-size:150px;color:rgba(255,255,255,.08);line-height:1;pointer-events:none;user-select:none;}
.hero-greet{font-size:13px;color:rgba(255,255,255,.7);}
.hero-name{font-size:26px;font-weight:900;color:#fff;margin-top:2px;}
.hero-pts-row{display:grid;grid-template-columns:1fr auto 1fr;gap:10px;align-items:center;margin-top:18px;}
.hpc{background:rgba(255,255,255,.40);border-radius:14px;padding:14px;text-align:center;backdrop-filter:blur(1px);border:1px solid rgba(255,255,255,.22);}
.hpc .n{font-family:'Bebas Neue';font-size:50px;line-height:1;color:#fff;}
.hpc .l{font-size:10px;color:rgba(255,255,255,.7);font-weight:700;margin-top:2px;text-transform:uppercase;}
.hpc.opp .n{color:var(--gold);}
.hpc-tag{font-size:10px;color:rgba(255,255,255,.78);font-weight:800;line-height:1;letter-spacing:.3px;margin-bottom:4px;}
.hpc-user{font-size:14px;font-weight:900;color:#fff;line-height:1.1;word-break:break-word;}
.vs-txt{font-family:'Bebas Neue';font-size:26px;color:rgba(255,255,255,.5);text-align:center;}
.room-bar{display:flex;align-items:center;justify-content:space-between;background:var(--s1);border-bottom:1px solid var(--border);padding:12px 18px;}
.room-lbl{font-size:10px;color:var(--text2);font-weight:700;text-transform:uppercase;letter-spacing:.5px;}
.room-code{font-family:'Bebas Neue';font-size:28px;letter-spacing:4px;color:var(--accent);}
.copy-btn{background:var(--accentf);border:none;color:var(--accent);padding:7px 14px;border-radius:8px;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit;transition:all .2s;}
.copy-btn:hover{background:var(--accent);color:#fff;}
.stats-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;padding:12px 16px;}
.sc{background:var(--s1);border:1px solid var(--border);border-radius:12px;padding:12px;text-align:center;box-shadow:var(--shadow);}
.sc .n{font-family:'Bebas Neue';font-size:34px;line-height:1;}
.sc .l{font-size:10px;color:var(--text2);font-weight:700;margin-top:3px;}
.sc.acc .n{color:var(--accent);}
.sc.gold .n{color:var(--gold);}
.sc.grn .n{color:var(--green);}
.info-card{background:var(--s1);border:1px solid var(--border);border-radius:var(--r);padding:14px;margin:0 16px 10px;box-shadow:var(--shadow);}
.info-card .itag{font-size:10px;color:var(--text2);font-weight:700;text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px;}
.info-card .ival{font-family:'Bebas Neue';font-size:20px;color:var(--accent);}
.info-card .isub{font-size:11px;color:var(--text2);margin-top:3px;}
.pts-info-row{display:flex;gap:8px;padding:0 16px 16px;}
.pts-box{flex:1;background:var(--s1);border:1px solid var(--border);border-radius:10px;padding:10px;text-align:center;box-shadow:var(--shadow);}
.pts-box .n{font-family:'Bebas Neue';font-size:30px;line-height:1;}
.pts-box .l{font-size:10px;color:var(--text2);font-weight:700;margin-top:2px;}
.pts-box.grn .n{color:var(--green);}
.pts-box.gold .n{color:var(--gold);}
/* GROUPS */
.gtabs-scroll{padding:10px 14px;border-bottom:1px solid var(--border);background:var(--s1);}
.gtabs-scroll{position:sticky;top:56px;z-index:30;backdrop-filter:saturate(1.1) blur(8px);}
.gtabs{display:grid;grid-template-columns:repeat(6,minmax(0,1fr));gap:6px;width:100%;}
.gtab{padding:7px 4px;background:var(--s2);border:none;border-radius:100px;color:var(--text2);font-size:12px;font-weight:800;cursor:pointer;font-family:inherit;transition:all .2s;flex:0 0 auto;}
.gtab.on{background:var(--accent);color:#fff;}
.standings{
  margin:6px 0 0;
  border:1px solid var(--border);
  border-radius:16px;
  overflow:hidden;
  background:var(--s1);
  box-shadow:var(--shadow);
}
.sth{display:grid;grid-template-columns:24px minmax(112px,1.25fr) repeat(8,minmax(0,.82fr));gap:4px;padding:9px 10px;background:var(--s2);font-size:10px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:.5px;align-items:center;border-bottom:1px solid var(--border);}
.str{display:grid;grid-template-columns:24px minmax(112px,1.25fr) repeat(8,minmax(0,.82fr));gap:4px;padding:9px 10px;background:var(--s1);border-top:1px solid var(--border);align-items:center;font-size:12px;}
.str:hover{background:var(--accentf);}
.str .pos{color:var(--text2);font-weight:700;font-size:11px;text-align:center;}
.str .team-n{display:flex;align-items:center;gap:6px;font-weight:700;min-width:0;}
.str .team-n .flag-ico{flex-shrink:0;}
.str .team-name{min-width:0;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-size:clamp(8px,1vw,12px);line-height:1.15;letter-spacing:-.01em;}
.str .sv{text-align:center;color:var(--text2);font-size:12px;}
.str .pts-v{text-align:center;font-weight:900;font-size:15px;color:var(--accent);}
.qi{width:3px;height:18px;border-radius:2px;flex-shrink:0;}
.flag-ico{width:18px;height:12px;object-fit:cover;border-radius:2px;display:inline-block;vertical-align:middle;box-shadow:0 0 0 1px rgba(0,0,0,.08);}
.flag-fallback{display:inline-flex;align-items:center;justify-content:center;min-width:18px;min-height:12px;line-height:1;}
.flag-duo{display:inline-flex;align-items:center;gap:2px;vertical-align:middle;}
.flag-duo .flag-ico{width:15px;height:10px;}
/* Match cards */
.mcard{
  background:var(--s1);
  border:1px solid var(--border);
  border-radius:16px;
  margin:0 0 10px;
  overflow:hidden;
  box-shadow:var(--shadow);
}
.mcard-hdr{padding:9px 12px 6px;background:var(--s2);font-size:10px;color:var(--text2);font-weight:700;display:flex;justify-content:space-between;align-items:center;}
.mcard-body{padding:12px 12px 10px;}
.mteams{display:grid;grid-template-columns:1fr auto 1fr;align-items:flex-start;gap:6px;}
.mt{
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:flex-start;
  text-align:center;
}
.mt .fl{display:flex;align-items:center;justify-content:center;height:18px;margin-bottom:4px;min-height:18px;}
.mt .fl .flag-ico{width:24px;height:16px;}
.mt .nm{
  font-size:11px;
  font-weight:800;
  line-height:1.2;
  max-width:100%;
  display:-webkit-box;
  -webkit-box-orient:vertical;
  -webkit-line-clamp:2;
  overflow:hidden;
  white-space:normal;
  min-height:2.4em;
}
.score-ctrl{display:flex;align-items:center;gap:8px;}
.scw{display:flex;flex-direction:column;align-items:center;gap:3px;}
.sarr{width:30px;height:22px;border:none;background:var(--s2);color:var(--text2);border-radius:5px;cursor:pointer;font-size:12px;display:flex;align-items:center;justify-content:center;transition:all .15s;}
.sarr:hover{background:var(--accent);color:#fff;}
.snum{width:46px;height:46px;background:var(--s2);border:1.5px solid var(--border);border-radius:10px;display:flex;align-items:center;justify-content:center;font-family:'Bebas Neue';font-size:30px;color:var(--text);transition:all .2s;}
.snum.active{border-color:var(--accent);background:var(--accentf);color:var(--accent);}
.sdiv{font-family:'Bebas Neue';font-size:22px;color:var(--text2);}
/* Locked state */
.locked-display{display:flex;align-items:center;justify-content:center;gap:6px;padding:8px 0;}
.locked-score{font-family:'Bebas Neue';font-size:38px;color:var(--accent);letter-spacing:2px;}
.locked-dash{font-family:'Bebas Neue';font-size:28px;color:var(--text2);}
.result-display{
  display:flex;
  align-items:center;
  justify-content:center;
  gap:6px;
  min-width:128px;
  padding:4px 6px;
}
.result-score{
  font-family:'Bebas Neue';
  font-size:34px;
  line-height:1;
  color:var(--accent);
  letter-spacing:1px;
}
.result-dash{
  font-family:'Bebas Neue';
  font-size:24px;
  color:var(--text2);
}
.lock-tag{display:inline-flex;align-items:center;gap:3px;background:var(--accentf);color:var(--accent);font-size:9px;font-weight:800;padding:2px 8px;border-radius:18px;letter-spacing:.2px;white-space:nowrap;}
.mactions{margin-top:10px;display:flex;gap:6px;align-items:center;}
.pbtn{flex:1;padding:8px 7px;background:var(--accent);border:none;color:#fff;font-size:11px;font-weight:800;border-radius:10px;cursor:pointer;font-family:inherit;transition:all .2s;letter-spacing:.15px;min-width:0;}
.pbtn:hover{opacity:.88;}
.ubtn{flex:1;padding:8px 7px;background:var(--s2);border:1.5px solid var(--border);color:var(--text2);font-size:11px;font-weight:800;border-radius:10px;cursor:pointer;font-family:inherit;transition:all .2s;letter-spacing:.15px;min-width:0;}
.ubtn:hover{border-color:var(--red);color:var(--red);}
/* Admin result entry (visible to admin in match card) */
.admin-result{border-top:1px dashed var(--border);margin-top:12px;padding-top:10px;}
.adm-tag{font-size:9px;font-weight:800;color:var(--text2);text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px;}
.adm-score-row{display:flex;align-items:center;gap:8px;}
.adm-si{width:52px;padding:7px;background:var(--s2);border:1.5px solid var(--border);border-radius:8px;color:var(--text);font-size:18px;font-family:'Bebas Neue';text-align:center;outline:none;transition:border-color .2s;}
.adm-si:focus{border-color:var(--gold);}
.adm-dash{font-family:'Bebas Neue';font-size:18px;color:var(--text2);}
.adm-save{padding:7px 16px;background:var(--gold);border:none;color:#fff;font-size:11px;font-weight:800;border-radius:8px;cursor:pointer;font-family:inherit;transition:all .15s;margin-left:auto;}
.adm-save:hover{opacity:.85;}
/* BRACKET */
.bkt-round-tabs{overflow-x:auto;padding:10px 14px;border-bottom:1px solid var(--border);background:var(--s1);scrollbar-width:none;}
.bkt-round-tabs::-webkit-scrollbar{display:none;}
.bkt-rtabs{display:flex;gap:6px;width:max-content;}
.brtab{padding:7px 16px;background:var(--s2);border:none;border-radius:100px;color:var(--text2);font-size:12px;font-weight:800;cursor:pointer;font-family:inherit;transition:all .2s;white-space:nowrap;}
.brtab.on{background:var(--accent);color:#fff;}
/* Bracket tree for SF/Final */
.bracket-tree{padding:16px 14px 48px;display:flex;flex-direction:column;gap:14px;align-items:stretch;}
.bracket-grid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:10px;align-items:start;}
.bracket-grid.lower{grid-template-columns:repeat(3,minmax(0,1fr));}
.bkt-final-section{width:100%;display:flex;flex-direction:column;align-items:stretch;gap:12px;}
.bkt-sf-row{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:10px;width:100%;padding:0 14px;}
.bkt-end-row{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:10px;width:100%;padding:0 14px;align-items:start;}
.bkt-match-card{flex:1;background:var(--s1);border:1.5px solid var(--border);border-radius:12px;overflow:hidden;box-shadow:var(--shadow);}
.bkt-match-card.final-card{border-color:var(--gold);box-shadow:0 4px 20px rgba(212,150,10,.15);}
.bkt-match-title{padding:6px 10px;background:var(--s2);font-size:9px;font-weight:800;color:var(--text2);text-transform:uppercase;letter-spacing:.5px;}
.bkt-match-card.final-card .bkt-match-title{background:var(--goldf);color:var(--gold);}
.bkt-team-row{display:flex;align-items:center;gap:8px;padding:9px 10px;border-bottom:1px solid var(--border);cursor:pointer;transition:all .2s;}
.bkt-team-row:last-child{border-bottom:none;}
.bkt-team-row:hover{background:var(--s2);}
.bkt-team-row.sel{background:var(--accentf);border-left:3px solid var(--accent);}
.bkt-team-row .bfl{font-size:18px;}
.bkt-team-row .bnm{flex:1;font-size:12px;font-weight:700;line-height:1.2;}
.bkt-team-row .bchk{font-size:12px;color:var(--accent);font-weight:800;}
.connector{display:flex;align-items:center;justify-content:center;height:32px;position:relative;}
.connector::before{content:'▼';font-size:16px;color:var(--text2);}
/* List bracket */
.bkt-list{margin:10px 14px;display:flex;flex-direction:column;gap:8px;}
.bkt-match-list{background:var(--s1);border:1px solid var(--border);border-radius:12px;overflow:hidden;box-shadow:var(--shadow);}
.bkt-list-hdr{padding:7px 12px;background:var(--s2);font-size:10px;font-weight:700;color:var(--text2);display:flex;justify-content:space-between;}
.bkt-list-team{display:flex;align-items:center;gap:8px;padding:9px 12px;border-bottom:1px solid var(--border);cursor:pointer;transition:background .15s;}
.bkt-list-team:last-child{border-bottom:none;}
.bkt-list-team:hover{background:var(--s2);}
.bkt-list-team.sel{background:var(--accentf);}
.bkt-list-team .lfl{font-size:18px;}
.bkt-list-team .lnm{flex:1;font-size:13px;font-weight:700;}
.bkt-list-team .lchk{color:var(--accent);font-weight:800;font-size:13px;}
/* LEADERBOARD */
.lb-hero{background:var(--accent);padding:20px 18px;position:relative;overflow:hidden;}
.lb-bg-txt{position:absolute;right:-5px;bottom:-20px;font-family:'Bebas Neue';font-size:90px;color:rgba(255,255,255,.08);pointer-events:none;user-select:none;}
.lb-label{font-size:10px;color:rgba(255,255,255,.6);font-weight:700;text-transform:uppercase;letter-spacing:.5px;}
.lb-vs-row{display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:10px;margin-top:14px;}
.lb-pl{text-align:center;}
.lb-pl-name{font-size:13px;font-weight:800;margin-bottom:3px;color:rgba(255,255,255,.8);}
.lb-pl-pts{font-family:'Bebas Neue';font-size:56px;line-height:1;color:#fff;}
.lb-opp .lb-pl-pts{color:var(--gold);}
.lb-vs-txt{font-family:'Bebas Neue';font-size:26px;color:rgba(255,255,255,.4);text-align:center;}
.lb-bar-wrap{margin-top:12px;height:6px;background:rgba(255,255,255,.15);border-radius:10px;overflow:hidden;}
.lb-bar-fill{height:100%;background:rgba(255,255,255,.7);border-radius:10px;transition:width .6s ease;}
.lb-list{margin:0 14px;}
.lb-row{display:grid;grid-template-columns:1fr auto 1fr;gap:6px;align-items:center;padding:10px 0;border-bottom:1px solid var(--border);}
.lb-row:last-child{border-bottom:none;}
.pred-cell{text-align:center;}
.pred-sc{font-family:'Bebas Neue';font-size:22px;line-height:1;}
.pred-sc.me-c{color:var(--accent);}
.pred-sc.opp-c{color:var(--gold);}
.pred-pts-tag{display:inline-block;font-size:9px;font-weight:800;padding:2px 7px;border-radius:10px;margin-top:2px;text-transform:uppercase;letter-spacing:.3px;}
.pts-exact{background:var(--goldf);color:var(--gold);}
.pts-result{background:var(--greenf);color:var(--green);}
.pts-none{background:rgba(100,100,100,.1);color:var(--text2);}
.match-mid{font-size:10px;color:var(--text2);text-align:center;line-height:1.5;}
.actual-r{font-family:'Bebas Neue';font-size:14px;color:var(--accent);display:block;margin-top:2px;}
/* SETTINGS */
.set-sec{margin:14px 14px 20px;}
.set-sec h3{font-size:14px;font-weight:900;margin-bottom:12px;padding-bottom:8px;border-bottom:1px solid var(--border);color:var(--text2);text-transform:uppercase;letter-spacing:.5px;}
.set-row{display:flex;align-items:center;justify-content:space-between;padding:13px 0;border-bottom:1px solid var(--border);}
.set-row:last-child{border-bottom:none;}
.sl{font-size:14px;font-weight:700;}
.sl span{font-size:11px;color:var(--text2);display:block;font-weight:500;margin-top:2px;}
.pts-ctrl{display:flex;align-items:center;gap:10px;}
.pts-val{font-family:'Bebas Neue';font-size:32px;color:var(--accent);width:44px;text-align:center;}
.ptsbtn{width:34px;height:34px;border:1.5px solid var(--border);background:var(--s2);color:var(--text);border-radius:9px;font-size:18px;cursor:pointer;font-family:inherit;transition:all .15s;display:flex;align-items:center;justify-content:center;}
.ptsbtn:hover{background:var(--accent);border-color:var(--accent);color:#fff;}
/* Toggle switch */
.toggle{position:relative;width:44px;height:24px;flex-shrink:0;}
.toggle input{opacity:0;width:0;height:0;}
.tslider{position:absolute;inset:0;background:var(--s3);border-radius:100px;cursor:pointer;transition:background .2s;}
.tslider::after{content:'';position:absolute;width:18px;height:18px;left:3px;top:3px;background:#fff;border-radius:50%;transition:transform .2s;box-shadow:0 1px 4px rgba(0,0,0,.2);}
.toggle input:checked+.tslider{background:var(--accent);}
.toggle input:checked+.tslider::after{transform:translateX(20px);}
/* BG theme picker */
.bg-picker{display:flex;gap:8px;flex-wrap:wrap;}
.bg-swatch{width:36px;height:36px;border-radius:8px;cursor:pointer;border:2.5px solid transparent;transition:all .15s;position:relative;}
.bg-swatch.on{border-color:var(--accent);}
.bg-swatch.on::after{content:'✓';position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:800;color:var(--text);}
/* Toast */
.toast{position:fixed;top:16px;left:50%;transform:translateX(-50%);background:var(--green);color:#fff;font-size:12px;font-weight:700;padding:9px 18px;border-radius:100px;z-index:999;animation:toastIn .3s ease;white-space:nowrap;box-shadow:0 4px 16px rgba(0,0,0,.15);}
@keyframes toastIn{from{opacity:0;transform:translateX(-50%) translateY(-8px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
/* Empty */
.empty{text-align:center;padding:60px 20px;}
.empty .ico{font-size:48px;margin-bottom:14px;}
.empty h3{font-size:18px;font-weight:900;margin-bottom:8px;}
.empty p{font-size:13px;color:var(--text2);line-height:1.6;}
/* Tweaks panel */
.tweaks-panel{position:fixed;bottom:80px;right:14px;z-index:200;background:var(--s1);border:1px solid var(--border);border-radius:16px;padding:16px;width:230px;box-shadow:0 20px 60px rgba(0,0,0,.15);animation:pgIn .3s ease;}
.tweaks-panel h4{font-size:13px;font-weight:800;margin-bottom:12px;}
.tw-row{margin-bottom:10px;}
.tw-lbl{font-size:11px;color:var(--text2);font-weight:700;margin-bottom:6px;display:block;text-transform:uppercase;letter-spacing:.3px;}
.tw-opts{display:flex;gap:5px;flex-wrap:wrap;}
.tw-opt{padding:5px 12px;border:1.5px solid var(--border);border-radius:100px;font-size:11px;font-weight:700;cursor:pointer;background:var(--s2);color:var(--text2);transition:all .15s;font-family:inherit;}
.tw-opt.on{background:var(--accent);border-color:var(--accent);color:#fff;}
.section-title{padding:14px 16px 6px;font-size:11px;font-weight:800;color:var(--text2);text-transform:uppercase;letter-spacing:.5px;}

/* MODAL */
.modal-backdrop{position:fixed;inset:0;background:rgba(0,0,0,.42);z-index:300;display:flex;align-items:flex-end;justify-content:center;padding:16px;}
.modal-card{width:min(100%,560px);max-height:86vh;overflow-x:hidden;overflow-y:auto;background:var(--s1);border:1px solid var(--border);border-radius:20px;box-shadow:0 24px 80px rgba(0,0,0,.25);padding:16px;}
.modal-head{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;margin-bottom:6px;}
.modal-kicker{font-size:10px;font-weight:800;color:var(--text2);text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px;}
.modal-head h3{font-size:20px;font-weight:900;line-height:1.1;}
.modal-close{border:1px solid var(--border);background:var(--s2);color:var(--text2);border-radius:999px;padding:8px 12px;font-size:12px;font-weight:800;cursor:pointer;font-family:inherit;}
.modal-sub{font-size:12px;color:var(--text2);margin-bottom:12px;}
.player-list{display:flex;flex-direction:column;gap:8px;margin-top:12px;}
.player-row{display:flex;flex-direction:column;gap:8px;padding:12px;border:1px solid var(--border);border-radius:14px;background:var(--s2);cursor:pointer;transition:all .15s;}
.player-row:hover{border-color:var(--accent);box-shadow:0 0 0 3px var(--accentf);}
.player-top{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;}
.player-main{min-width:0;flex:1;}
.player-name{font-size:clamp(11px,2.7vw,14px);font-weight:800;line-height:1.18;word-break:break-word;}
.player-meta{font-size:clamp(9px,2.4vw,11px);color:var(--text2);margin-top:4px;line-height:1.42;display:flex;flex-direction:column;gap:3px;}
.player-meta-line{display:block;word-break:break-word;}
.player-badges{display:flex;gap:6px;flex-wrap:wrap;margin-top:6px;}
.player-badge{display:inline-flex;align-items:center;padding:3px 8px;border-radius:999px;font-size:10px;font-weight:800;background:var(--accentf);color:var(--accent);}
.player-badge.dim{background:var(--s1);color:var(--text2);}
.player-row.on{border-color:var(--accent);box-shadow:0 0 0 3px var(--accentf);}
.player-editor{padding:12px;border:1px solid var(--border);border-radius:14px;background:var(--s1);margin-bottom:12px;}
.player-editor-head{display:flex;justify-content:space-between;align-items:center;gap:10px;margin-bottom:10px;flex-wrap:wrap;}
.player-editor-title{font-size:13px;font-weight:900;color:var(--text);}
.player-editor-note{font-size:11px;color:var(--text2);margin-top:4px;line-height:1.45;}
.player-select{width:100%;padding:9px 10px;border:1.5px solid var(--border);border-radius:10px;background:var(--s2);font:inherit;color:var(--text);outline:none;}
.player-select:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accentf);}
.player-edit-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;min-width:0;}
.player-edit.full{margin-top:12px;}
.player-field{display:flex;flex-direction:column;gap:4px;min-width:0;}
.player-field label{font-size:10px;color:var(--text2);font-weight:800;text-transform:uppercase;letter-spacing:.4px;}
.player-field input,.player-field select{width:100%;min-width:0;padding:9px 10px;border:1.5px solid var(--border);border-radius:10px;background:var(--s1);font:inherit;color:var(--text);outline:none;max-width:100%;}
.player-field input:focus,.player-field select:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accentf);}
.player-edit-actions{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px;}
.player-mini-btn{
  min-width:0;
  padding:8px 12px;
  border:1.5px solid var(--border);
  border-radius:10px;
  background:var(--s2);
  color:var(--text2);
  font:inherit;
  font-size:11px;
  font-weight:800;
  cursor:pointer;
  transition:all .15s;
  display:inline-flex;
  align-items:center;
  justify-content:center;
  gap:4px;
}
.player-mini-btn:hover{border-color:var(--accent);color:var(--accent);}
.player-mini-btn.primary{background:var(--accent);border-color:var(--accent);color:#fff;}
.player-mini-btn.primary:hover{opacity:.92;color:#fff;}
.player-mini-btn.danger{background:transparent;border-color:var(--red);color:var(--red);}
.player-mini-btn.danger:hover{background:var(--red);color:#fff;}
.player-mini-btn:disabled{opacity:.55;cursor:not-allowed;transform:none;}
.room-hero-score{display:flex;flex-direction:column;gap:4px;align-items:center;}
.room-score-sub{display:flex;flex-direction:column;gap:1px;font-size:10px;line-height:1.25;color:rgba(255,255,255,.82);font-weight:700;}
.member-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:8px;padding:12px 16px 0;}
.member-card{background:var(--s1);border:1px solid var(--border);border-radius:16px;padding:12px 14px;box-shadow:var(--shadow);}
.member-card.me{border-color:var(--accent);}
.member-card .mc-name{font-size:13px;font-weight:900;color:var(--text);}
.member-card .mc-row{display:flex;align-items:baseline;gap:10px;flex-wrap:wrap;margin-top:4px;}
.member-card .mc-total{display:flex;align-items:baseline;gap:3px;line-height:1;}
.member-card .mc-total-num{font-family:'Bebas Neue';font-size:36px;color:var(--accent);}
.member-card .mc-unit{font-size:12px;color:var(--text2);font-weight:800;}
.member-card .mc-pred{font-size:11px;color:var(--text2);font-weight:700;}
.member-card .mc-break{font-size:11px;color:var(--text2);font-weight:700;width:100%;line-height:1.4;}
.member-card .mc-break strong{color:var(--text);}
.pred-compare{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:10px;}
.pred-box{background:var(--s2);border:1px solid var(--border);border-radius:10px;padding:7px 8px;min-width:0;display:flex;flex-direction:column;gap:2px;}
.pred-box .pu{font-size:11px;font-weight:800;color:var(--text);line-height:1.1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.pred-box .pv{font-size:13px;font-weight:900;color:var(--text);line-height:1.1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.pred-box .ptag{font-size:10px;font-weight:900;opacity:.82;line-height:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.pred-box.me{background:var(--accentf);border-color:rgba(30,110,240,.22);}
.pred-box.opp{background:var(--goldf);border-color:rgba(212,150,10,.22);}
.pred-edit{display:flex;align-items:center;justify-content:center;gap:4px;flex-wrap:nowrap;}
.pred-edit .snum{width:40px;height:40px;font-size:26px;border-radius:9px;}
.pred-edit .sarr{width:26px;height:20px;font-size:11px;border-radius:5px;}
.pred-edit .sdiv{font-size:18px;}
.timezone-select{display:flex;gap:6px;flex-wrap:wrap;}
.timezone-chip{padding:8px 12px;border:1.5px solid var(--border);border-radius:999px;background:var(--s1);color:var(--text2);font-size:12px;font-weight:800;cursor:pointer;font-family:inherit;display:flex;flex-direction:column;align-items:flex-start;gap:2px;min-width:112px;line-height:1.1;}
.timezone-chip.on{background:var(--accent);border-color:var(--accent);color:#fff;}
.tz-main{font-size:12px;font-weight:800;}
.tz-sub{font-size:10px;font-weight:700;opacity:.85;letter-spacing:.2px;}
@media (max-width: 520px){
  .auth-top-title{font-size:18px;letter-spacing:.14em;}
  .player-edit-grid{grid-template-columns:1fr;}
  .player-editor{padding:10px;}
  .player-name{font-size:11px;}
  .player-meta{font-size:9px;}
  .player-list{gap:6px;}
  .player-row{padding:10px;}
  .player-mini-btn,.btn.ghost,.modal-close{font-size:11px;}
  .rank-card-top{flex-direction:column;align-items:flex-start;}
  .rank-score-sub{text-align:left;}
}

/* RANKING */
.rank-tabs{display:flex;gap:8px;padding:10px 14px 0;flex-wrap:wrap;}
.rank-tab{padding:8px 14px;border:1.5px solid var(--border);border-radius:999px;background:var(--s1);color:var(--text2);font-size:12px;font-weight:800;cursor:pointer;font-family:inherit;}
.rank-tab.on{background:var(--accent);border-color:var(--accent);color:#fff;}
.rank-list{display:flex;flex-direction:column;gap:8px;margin:0 14px 14px;}
.rank-card{background:var(--s1);border:1px solid var(--border);border-radius:16px;padding:12px;box-shadow:var(--shadow);}
.rank-card-top{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;}
.rank-card-left{min-width:0;flex:1;}
.rank-card-rank{font-family:'Bebas Neue';font-size:28px;line-height:1;color:var(--accent);}
.rank-card-name{font-size:15px;font-weight:900;line-height:1.25;}
.rank-card-meta{display:flex;gap:6px;flex-wrap:wrap;margin-top:6px;font-size:11px;color:var(--text2);}
.rank-card-foot{display:flex;justify-content:space-between;gap:8px;flex-wrap:wrap;margin-top:10px;padding-top:10px;border-top:1px solid var(--border);font-size:11px;color:var(--text2);}
.rank-score{font-family:'Bebas Neue';font-size:34px;line-height:1;color:var(--accent);}
.rank-score-sub{font-size:10px;color:var(--text2);margin-top:2px;text-align:right;}
.rank-tools{display:flex;gap:8px;align-items:center;padding:10px 14px 0;flex-wrap:wrap;}
.rank-search{flex:1;min-width:180px;padding:11px 14px;border:1.5px solid var(--border);border-radius:12px;background:var(--s1);font:inherit;color:var(--text);outline:none;}
.rank-search:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accentf);}
.filter-wrap{display:flex;gap:6px;overflow-x:auto;scrollbar-width:none;max-width:100%;padding-bottom:2px;}
.filter-wrap::-webkit-scrollbar{display:none;}
.filter-chip{flex:0 0 auto;padding:8px 12px;border:1.5px solid var(--border);border-radius:100px;background:var(--s1);color:var(--text2);font-size:12px;font-weight:800;cursor:pointer;font-family:inherit;white-space:nowrap;display:inline-flex;align-items:center;gap:6px;}
.filter-chip.on{border-color:var(--accent);background:var(--accentf);color:var(--accent);}
.rank-meta{display:flex;justify-content:space-between;gap:8px;flex-wrap:wrap;padding:8px 14px 0;font-size:11px;color:var(--text2);}
.rank-country{border:1px solid var(--border);background:var(--accentf);color:var(--accent);border-radius:999px;padding:6px 10px;font:inherit;font-size:11px;font-weight:800;cursor:pointer;white-space:nowrap;display:inline-flex;align-items:center;gap:6px;}
.rank-country:hover{filter:brightness(.97);}
.point-sec .set-row{max-width:760px;}
.point-sec .pts-ctrl{margin-left:auto;}
@media (min-width: 920px){
  .sth,.str{grid-template-columns:28px minmax(180px,1.7fr) repeat(8,minmax(0,1fr));}
}

/* BRACKET */
.bracket-board{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:10px;padding:12px 14px 18px;overflow:hidden;}
.bracket-col{display:flex;flex-direction:column;gap:8px;min-width:0;}
.bracket-col-hdr{padding:8px 12px;border-radius:12px;background:var(--accent);color:#fff;font-size:12px;font-weight:900;letter-spacing:.4px;box-shadow:var(--shadow);}
.bracket-card{background:var(--s1);border:1px solid var(--border);border-radius:14px;overflow:hidden;box-shadow:var(--shadow);}
.bracket-card.final{border-color:var(--gold);box-shadow:0 4px 16px rgba(212,150,10,.15);}
.bracket-card.compact .bracket-team{padding:8px 10px;}
.bracket-card.compact .bracket-name{font-size:10px;}
.bracket-card-hdr{padding:7px 10px;background:var(--s2);font-size:9px;font-weight:800;color:var(--text2);text-transform:uppercase;letter-spacing:.4px;}
.bracket-card.final .bracket-card-hdr{background:var(--goldf);color:var(--gold);}
.bracket-summary{padding:8px 10px;display:flex;flex-wrap:wrap;gap:6px;border-bottom:1px solid var(--border);background:rgba(255,255,255,.45);}
.bracket-pill{display:inline-flex;align-items:center;gap:4px;padding:4px 8px;border-radius:100px;font-size:10px;font-weight:800;background:var(--s2);color:var(--text2);}
.bracket-pill.on{background:var(--accentf);color:var(--accent);}
.bracket-pill.gold.on{background:var(--goldf);color:var(--gold);}
.bracket-team{display:flex;align-items:center;gap:8px;padding:10px 10px;border-top:1px solid var(--border);cursor:pointer;transition:background .15s;}
.bracket-team:first-of-type{border-top:none;}
.bracket-team:hover{background:var(--s2);}
.bracket-team.on{background:var(--accentf);border-left:3px solid var(--accent);}
.bracket-team.resolved{background:linear-gradient(90deg,rgba(255,255,255,.4),rgba(255,255,255,0));}
.bracket-team.winner{background:var(--goldf);border-left:3px solid var(--gold);}
.bracket-fl{font-size:18px;line-height:1;}
.bracket-name{flex:1;font-size:12px;font-weight:800;line-height:1.25;min-width:0;}
.bracket-check{font-size:12px;color:var(--accent);font-weight:900;}
.bracket-team.winner .bracket-check{color:var(--gold);}

    background:linear-gradient(180deg,#d9d2c6 0%,#ede6da 100%);

    left:calc(50% + clamp(120px, 11vw, 175px));

  const deletedIds=new Set((overrides?.deletedIds||[]).map(id=>String(id)));
  const patches=overrides?.players||{};
  const additionsByCountry=overrides?.additionsByCountry||{};
  const next={};
  Object.entries(base||{}).forEach(([country,players])=>{
    next[country]=(players||[])
      .filter((player)=>!deletedIds.has(String(player.id)))
      .map((player)=>{
        const patch=patches[player.id];
        if(!patch)return normalizePlayerRecord(player);
        return normalizePlayerRecord({...player,...patch,_edited:true});
      });
  });
  Object.entries(additionsByCountry).forEach(([country,players])=>{
    if(!next[country])next[country]=[];

      if(!player?.id||deletedIds.has(String(player.id)))return;

  R16:{prev:'R32',pair:[0,1]},
  QF:{prev:'R16',pair:[0,1]},

function koMatchKey(roundId,matchIndex){return `${roundId}-${matchIndex}`;}
function koResolvedTeam(roundId,matchIndex,side,picks){
  const round = KO_ROUNDS.find(r=>r.id===roundId);
  if(!round) return null;
  const match = round.matches[matchIndex];
  if(!match) return null;
  if(roundId==='R32'){
    return side==='home'?match.home:match.away;
  }
  const meta = KO_SOURCES[roundId];
  if(!meta) return side==='home'?match.home:match.away;
  const sourceRound = KO_ROUNDS[KO_ROUND_INDEX[meta.prev]];
  const sourceMatchIndex = matchIndex * 2 + (side==='home'?meta.pair[0]:meta.pair[1]);
  const sourceLabel = match[side];
  const winnerSide = picks?.[koMatchKey(meta.prev, sourceMatchIndex)];
  if(!winnerSide || !sourceRound) return sourceLabel;
  return koResolvedTeam(meta.prev, sourceMatchIndex, winnerSide, picks) || sourceLabel;
}
function koWinnerLabel(roundId,matchIndex,picks){
  const choice = picks?.[koMatchKey(roundId,matchIndex)];
  if(!choice) return null;
  return koResolvedTeam(roundId,matchIndex,choice,picks);
}
function koLoserLabel(roundId,matchIndex,picks){
  const choice = picks?.[koMatchKey(roundId,matchIndex)];
  if(!choice) return null;
  return koResolvedTeam(roundId,matchIndex,choice==='home'?'away':'home',picks);
}
function normalizeSearchText(value){
  return String(value||'')
    .normalize('NFKD')
    .replace(/[\u0300-\u036f]/g,'')
    .toLowerCase()
    .replace(/[^a-z0-9\u3040-\u30ff\u4e00-\u9faf]+/g,'');
}
function stripDiacritics(value){
  return String(value||'').normalize('NFKD').replace(/[\u0300-\u036f]/g,'');
}
function normalizeRomajiLike(value){
  const prepared=String(value||'')
    .replace(/Æ/g,'Ae').replace(/æ/g,'ae')
    .replace(/Œ/g,'Oe').replace(/œ/g,'oe')
    .replace(/Ø/g,'O').replace(/ø/g,'o')
    .replace(/Ü/g,'Ue').replace(/ü/g,'ue')
    .replace(/Ö/g,'Oe').replace(/ö/g,'oe')
    .replace(/Ä/g,'Ae').replace(/ä/g,'ae')
    .replace(/ß/g,'ss')
    .replace(/Ł/g,'L').replace(/ł/g,'l')
    .replace(/Đ/g,'D').replace(/đ/g,'d')
    .replace(/Þ/g,'Th').replace(/þ/g,'th')
    .replace(/Ç/g,'C').replace(/ç/g,'c')
    .replace(/Ñ/g,'N').replace(/ñ/g,'n');
  const ascii=stripDiacritics(prepared)
    .replace(/[’']/g,' ')
    .replace(/[-_]/g,' ')
    .replace(/[^A-Za-z0-9\s]/g,' ')
    .replace(/\s+/g,' ')
    .trim()
    .toLowerCase();
  if(!ascii)return '';
  const consonants=new Set('bcdfghjklmnpqrstvwxyz'.split(''));
  const extendLooseConsonants=(word)=>{
    const chars=[...word];
    let out='';
    for(let i=0;i<chars.length;i+=1){
      const c=chars[i];
      const n=chars[i+1];
      if(!consonants.has(c)){out+=c;continue;}
      if(c==='n'&&(!n||(consonants.has(n)&&n!=='y'))){out+='n';continue;}
      if(n&&n===c){out+=c+c;i+=1;continue;}
      if(!n||(consonants.has(n)&&n!=='y')){out+=c+'u';continue;}
      out+=c;
    }
    return out;
  };
  return ascii.split(' ').filter(Boolean).map((word)=>extendLooseConsonants(
    word
      .replace(/ey/g,'ei')
      .replace(/\bky/g,'ki')
      .replace(/\bgy/g,'gi')
      .replace(/\bny/g,'ni')
      .replace(/\bhy/g,'hi')
      .replace(/\bmy/g,'mi')
      .replace(/\bry/g,'ri')
      .replace(/\bpy/g,'pi')
      .replace(/\bby/g,'bi')
      .replace(/\bsch/g,'sh')
      .replace(/qu/g,'ku')
      .replace(/ph/g,'f')
      .replace(/th/g,'t')
      .replace(/ck/g,'k')
      .replace(/gh/g,'g')
      .replace(/x/g,'ks')
      .replace(/c(?=[eiy])/g,'s')
      .replace(/c/g,'k')
      .replace(/g(?=[eiy])/g,'j')
      .replace(/l/g,'r')
      .replace(/v/g,'b')
      .replace(/y\b/g,'i')
  )).join(' ');
}
function toJapaneseName(value){
  const raw=String(value||'').trim();
  if(!raw)return '';
  if(/[\u3040-\u30ff\u3400-\u9fff]/.test(raw))return raw;
  const ascii=normalizeRomajiLike(raw);
  if(!ascii)return raw;
  const converter=window.romajiConv;
  if(!converter)return raw;
  const converted=converter(ascii).toKatakana();
  if(!converted||converted===ascii)return raw;
  return converted.replace(/\s+/g,'・');
}

async function api(path, body){

  try{

      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify(body),
    });
    return await res.json();
  }catch{
    return null;
  }
}

function savePrediction(roomId,userId,matchId,prediction){
  const current=grPred(roomId,{});
  const next={...current,[userId]:{...(current[userId]||{}),[matchId]:prediction}};
  ss(roomDataKey(roomId,PREDICTION_STORE_KEY),next);
  const user=gs('currentUser',null);
  if(HAS_BACKEND&&roomId&&userId&&user&&!user.isGuest){
    api('/api/state/prediction',{roomId,userId,matchId,prediction}).then((res)=>{
      const roomState=res?.roomState;
      if(roomState?.predictionsV2){
        ss(roomDataKey(roomId,PREDICTION_STORE_KEY),roomState.predictionsV2);
      }
      notifyStateChange();
    });
  }else{
    notifyStateChange();
  }
  return next;
}

    api('/api/state/clear',{roomId,userId:user.id});
  }

}

function hydrateFromBootstrap(){
  if(!BOOTSTRAP?.state)return false;
  const {rooms=[],users=[],roomStates={}}=BOOTSTRAP.state;
  ss('rooms',rooms);
  ss('users',users);
  Object.entries(roomStates).forEach(([roomId,state])=>{
    if(!state)return;
    ss(roomDataKey(roomId,PREDICTION_STORE_KEY),state.predictionsV2||state.predictions||{});
    ss(roomDataKey(roomId,'results'),state.results||{});
    ss(roomDataKey(roomId,'locked'),state.locked||{});
    ss(roomDataKey(roomId,'koPreds'),state.koPreds||{});
    ss(roomDataKey(roomId,'settings'),state.settings||DEFAULT_ROOM_SETTINGS);
  });
  return true;
}

  sr(demoRoomKey,PREDICTION_STORE_KEY,preds);
  const res=globalResults||{};
  if(!globalResults){
    GROUP_MATCHES.slice(0,6).forEach(m=>{res[m.id]={home:Math.floor(Math.random()*4),away:Math.floor(Math.random()*3)};});
  }
  sr(demoRoomKey,'results',res);
  sr(demoRoomKey,'locked',globalLocked||{'demo-opp':GROUP_MATCHES.slice(0,6).map(m=>m.id)});
  sr(demoRoomKey,'koPreds',globalKo||{});
  if(!gr(demoRoomKey,'settings',null))ss(roomDataKey(demoRoomKey,'settings'),DEFAULT_ROOM_SETTINGS);
  if(!gs('settings',null))ss('settings',DEFAULT_UI_SETTINGS);
  ss('inited',true);
}

function genCode(){return Math.random().toString(36).substring(2,8).toUpperCase();}

function calcPoints(preds,results,userId,settings){
  return calcPointSummary(preds,results,userId,settings).total;
}
function calcPointSummary(preds,results,userId,settings){
  const {resultPts=1,exactPts=2}=settings||{};
  let total=0;
  let resultHits=0;
  let exactHits=0;
  let resultPoints=0;
  let exactPoints=0;
  const up=preds[userId]||{};
  Object.entries(results).forEach(([mid,res])=>{
    const p=up[mid];if(!p)return;
    if(p.home===res.home&&p.away===res.away){
      total+=exactPts;exactHits+=1;exactPoints+=exactPts;return;
    }
    const pr=p.home>p.away?'H':p.home<p.away?'A':'D';
    const rr=res.home>res.away?'H':res.home<res.away?'A':'D';
    if(pr===rr){total+=resultPts;resultHits+=1;resultPoints+=resultPts;}
  });
  return {total,resultHits,exactHits,resultPoints,exactPoints,resultPts,exactPts};
}
function displayUserLabel(user,roomOrMembers){
  if(!user)return '--';
  const members=Array.isArray(roomOrMembers)
    ? roomOrMembers.filter(Boolean)
    : (roomOrMembers?.members||[])
      .map((id)=>gs('users',[]).find((u)=>u.id===id))
      .filter(Boolean);
  const dupCount=members.filter((m)=>m.username===user.username).length;
  const code=(user.memberCode||String(user.id||'').slice(-4)).toUpperCase();
  return dupCount>1 ? `${user.username} #${code}` : user.username;
}

function CountryModal({team,onClose}){
  if(!team)return null;
  const players=PLAYER_DATA[team]||[];
  const meta=teamMeta(team);
  const blankDraft={name:'',position:'FW',club:'',goals:'0',clubGoals:'0'};
  const [selectedPlayerId,setSelectedPlayerId]=useState('new');
  const [draft,setDraft]=useState(()=>({...blankDraft}));
  const [saving,setSaving]=useState(false);
  const [status,setStatus]=useState('');
  const selectedPlayer=selectedPlayerId==='new' ? null : players.find((p)=>p.id===selectedPlayerId)||null;

  useEffect(()=>{
    setDraft({...blankDraft});
    setSaving(false);
    setStatus('');
    setSelectedPlayerId('new');
  },[team]);

  useEffect(()=>{
    if(!players.length){
      setSelectedPlayerId('new');
      return;
    }
    if(selectedPlayerId!=='new' && !players.find((p)=>p.id===selectedPlayerId)){
      setSelectedPlayerId(players[0].id);
    }
  },[players,selectedPlayerId]);

  function startNewPlayer(){
    setSelectedPlayerId('new');
    setDraft({...blankDraft});
    setStatus('');
  }

  function updateDraft(key,value){
    setDraft((d)=>({...d,[key]:value}));
  }

  function commitOverrides(mutator){
    const overrides=loadCurrentPlayerOverrides();
    const next=mutator({...overrides});
    next.updatedAt=new Date().toISOString();
    saveCurrentPlayerOverrides(next);
    refreshPlayerDataView();
    notifyStateChange();
  }

  function syncDraftFromPlayer(p){
    setDraft({
      name:p.name||'',
      position:normalizePosition(p.position),
      club:p.club||'',
      goals:String(p.goals??0),
      clubGoals:String(p.clubGoals??0),
    });
  }

  useEffect(()=>{
    if(selectedPlayerId==='new'){
      setDraft({...blankDraft});
      return;
    }
    if(selectedPlayer){
      syncDraftFromPlayer(selectedPlayer);
    }
  },[selectedPlayerId, selectedPlayer?.id, team]);

  async function saveSelectedPlayer(){
    if(saving||selectedPlayerId==='new'||!selectedPlayer||!draft)return;
    const patch={};
    const nextValues={
      name:draft.name?.trim(),
      position:normalizePosition(draft.position),
      club:draft.club?.trim(),
      goals:Number(draft.goals||0),
      clubGoals:Number(draft.clubGoals||0),
    };
    Object.entries(nextValues).forEach(([key,value])=>{
      if(String(value)!==String(selectedPlayer[key]??'')) patch[key]=value;
    });
    if(!Object.keys(patch).length){
      setStatus('変更がありません');
      return;
    }
    setSaving(true);
    try{
      commitOverrides((overrides)=>{
        overrides.players ||= {};
        overrides.deletedIds ||= [];
        overrides.players[selectedPlayer.id]={...(overrides.players[selectedPlayer.id]||{}),...patch};
        overrides.deletedIds=overrides.deletedIds.filter((id)=>String(id)!==String(selectedPlayer.id));
        return overrides;
      });
      setSelectedPlayerId('new');
      setDraft({...blankDraft});
      setStatus('保存しました');
    }finally{
      setSaving(false);
    }
  }

  async function addSelectedPlayer(){
    if(saving||!draft)return;
    const name=(draft.name||'').trim();
    if(!name){
      setStatus('選手名を入力してください');
      return;
    }
    setSaving(true);
    try{
      commitOverrides((overrides)=>{
        overrides.additionsByCountry ||= {};
        overrides.players ||= {};
        overrides.deletedIds ||= [];
        const playerId=`manual-${Date.now()}-${Math.random().toString(36).slice(2,7)}`;
        const nextPlayer={
          id:playerId,
          country:team,
          countryJa:teamJa(team),
          countryName:teamJa(team),
          name,
          position:normalizePosition(draft.position),
          club:(draft.club||'').trim()||'Unknown',
          clubGoals:Number(draft.clubGoals||0),
          goals:Number(draft.goals||0),
          source:'manual',
          _added:true,
        };
        overrides.additionsByCountry[team]=[...(overrides.additionsByCountry[team]||[]),nextPlayer];
        overrides.deletedIds=overrides.deletedIds.filter((id)=>String(id)!==String(playerId));
        return overrides;
      });
      setSelectedPlayerId('new');
      setDraft({...blankDraft});
      setStatus('選手を追加しました');
    }finally{
      setSaving(false);
    }
  }

  async function deleteSelectedPlayer(){
    if(!selectedPlayer||saving)return;
    if(!confirm(`${playerDisplayName(selectedPlayer)} を削除しますか？`))return;
    setSaving(true);
    try{
      commitOverrides((overrides)=>{
        overrides.players ||= {};
        overrides.deletedIds ||= [];
        if(selectedPlayer._added){
          const list=overrides.additionsByCountry?.[team]||[];
          overrides.additionsByCountry={...(overrides.additionsByCountry||{}),[team]:list.filter((entry)=>String(entry.id)!==String(selectedPlayer.id))};
        }else{
          overrides.deletedIds=Array.from(new Set([...overrides.deletedIds,String(selectedPlayer.id)]));
        }
        delete overrides.players[selectedPlayer.id];
        return overrides;
      });
      setSelectedPlayerId('new');
      setDraft({...blankDraft});
      setStatus('選手を削除しました');
    }finally{
      setSaving(false);
    }
  }

  const editedCount=players.filter(p=>p._edited).length;
  const addedCount=players.filter(p=>p._added).length;
  return(
    <div className="modal-backdrop" onClick={onClose}>
      <div className="modal-card" onClick={e=>e.stopPropagation()}>
        <div className="modal-head">
          <div>
            <div className="modal-kicker">国別選手一覧</div>
            <h3><TeamFlag team={team}/> {meta.ja}</h3>
          </div>
          <button className="modal-close" onClick={onClose}>閉じる</button>
        </div>
        <div className="modal-sub">{(editedCount>0||addedCount>0)&&` / 修正済み ${editedCount}件 / 追加 ${addedCount}件`}</div>
        {status&&<div style={{fontSize:11,color:'var(--text2)',marginBottom:10}}>{status}</div>}
        <div className="player-list">
          {players.length===0&&<div style={{padding:'18px 12px',textAlign:'center',color:'var(--text2)',fontSize:13}}>まだ選手がいません</div>}
          {players.map(p=>(
            <div className={`player-row${selectedPlayerId===p.id?' on':''}`} key={p.id} onClick={()=>{setSelectedPlayerId(p.id);syncDraftFromPlayer(p);setStatus('');}}>
              <div className="player-top">
                <div className="player-main">
                  <div className="player-name">{playerDisplayName(p)}{p._added&&<span className="player-badge" style={{marginLeft:8}}>追加</span>}{p._edited&&<span className="player-badge" style={{marginLeft:8}}>修正済み</span>}</div>
                  <div className="player-meta">
                    <span className="player-meta-line">{teamJa(team)}</span>
                    <span className="player-meta-line">{positionJa(p.position)}</span>
                    <span className="player-meta-line">{p.club||'Unknown'}</span>
                    <span className="player-meta-line">2026ワールドカップ得点 {p.goals}</span>
                    <span className="player-meta-line">クラブ得点 {p.clubGoals}</span>
                  </div>
                </div>
              </div>
            </div>
          ))}
        </div>
        <div className="player-editor full">
          <div className="player-editor-head">
            <div>
              <div className="player-editor-title">{selectedPlayer ? '編集' : '新しい選手を追加'}</div>
              <div className="player-editor-note">
                {selectedPlayer ? '保存すると追加モードに戻ります。' : '選手をクリックして編集できます。ここから新規追加もできます。'}
              </div>
            </div>
            <button className="player-mini-btn" onClick={startNewPlayer} disabled={saving}>新規入力</button>
          </div>
          <div className="player-edit-grid">
            <div className="player-field">
              <label>選手名</label>
              <input value={draft?.name||''} onChange={(e)=>updateDraft('name',e.target.value)} placeholder="選手名" />
            </div>
            <div className="player-field">
              <label>ポジション</label>
              <select value={draft?.position||'FW'} onChange={(e)=>updateDraft('position',e.target.value)}>
                {['FW','MF','DF','GK','Unknown'].map((pos)=><option key={pos} value={pos}>{positionJa(pos)}</option>)}
              </select>
            </div>
            <div className="player-field">
              <label>所属クラブ</label>
              <input value={draft?.club||''} onChange={(e)=>updateDraft('club',e.target.value)} placeholder="所属クラブ" />
            </div>
            <div className="player-field">
              <label>2026ワールドカップ得点</label>
              <input type="number" min="0" step="1" value={draft?.goals||0} onChange={(e)=>updateDraft('goals',e.target.value)} />
            </div>
            <div className="player-field">
              <label>クラブ得点</label>
              <input type="number" min="0" step="1" value={draft?.clubGoals||0} onChange={(e)=>updateDraft('clubGoals',e.target.value)} />
            </div>
          </div>
          <div className="player-edit-actions">
            <button className="player-mini-btn primary" onClick={selectedPlayer?saveSelectedPlayer:addSelectedPlayer} disabled={saving}>
              {saving?(selectedPlayer?'保存中…':'追加中…'):(selectedPlayer?'保存':'追加')}
            </button>
            {selectedPlayer&&<>
              <button className="player-mini-btn" onClick={()=>syncDraftFromPlayer(selectedPlayer)} disabled={saving}>元の値へ戻す</button>
              <button className="player-mini-btn danger" onClick={deleteSelectedPlayer} disabled={saving}>削除</button>
            </>}
          </div>
        </div>
      </div>
    </div>
  );
}

function AuthScreen({onAuth}){
  const lang=useContext(LangCtx);const l=T[lang];
  const lastAuth=gs('lastAuthUser',null);
  const authProfiles=gs('authProfiles',{})||{};
  const [form,setForm]=useState(()=>({username:lastAuth?.username||'',roomCode:lastAuth?.roomCode||''}));
  const [err,setErr]=useState('');
  const set=k=>e=>setForm(f=>({...f,[k]:e.target.value}));

  function startGuestMode(){
    const guestRoomId='room-guest-local';
    const guestUserId='guest-local';
    const guestRoomCode='GUEST';
    const rooms=[...gs('rooms',[])];
    let room=rooms.find(r=>r.id===guestRoomId);
    if(!room){
      room={id:guestRoomId,code:guestRoomCode,members:[guestUserId],maxMembers:1};
      rooms.push(room);
    }else{
      room={...room,members:[guestUserId],maxMembers:1};
      const idx=rooms.findIndex(r=>r.id===guestRoomId);
      rooms[idx]=room;
    }
    ss('rooms',rooms);
    const users=[...gs('users',[])];
    const guest={id:guestUserId,username:'ゲスト',memberCode:'GUEST',roomId:guestRoomId,isGuest:true};
    const existingIdx=users.findIndex(u=>u.id===guestUserId);
    if(existingIdx>=0)users[existingIdx]=guest;else users.push(guest);
    ss('users',users);
    ss('currentUser',guest);
    onAuth(guest);
  }

  async function submit(){
    setErr('');
    const rawName=form.username.trim();
    if(!rawName){setErr('ユーザー名を入力してください');return;}
    const roomCodeInput=form.roomCode.trim().toUpperCase();
    const profileKey=roomCodeInput?`${roomCodeInput}::${rawName.toLowerCase()}`:'';
    const savedProfile=profileKey?authProfiles[profileKey]||null:null;
    const canReuse=!!savedProfile;
    if(HAS_BACKEND){
      const result=await api('/api/auth/join',{
        username:rawName,
        roomCode:form.roomCode.trim(),
        memberCode:canReuse?savedProfile?.memberCode||'':'',
        userId:canReuse?savedProfile?.id||'':'',
      });
      if(!result?.ok){
        setErr(result?.error||'参加できませんでした');
        return;
      }
      ss('rooms',result.rooms||[]);
      ss('users',result.users||[]);
      if(result.room?.state){
        const state=result.room.state;
        ss(roomDataKey(result.room.id,PREDICTION_STORE_KEY),state.predictionsV2||state.predictions||{});
        ss(roomDataKey(result.room.id,'results'),state.results||{});
        ss(roomDataKey(result.room.id,'locked'),state.locked||{});
        ss(roomDataKey(result.room.id,'koPreds'),state.koPreds||{});
        ss(roomDataKey(result.room.id,'settings'),state.settings||DEFAULT_ROOM_SETTINGS);
      }
      const persisted={
        id:result.user.id,
        username:result.user.username,
        memberCode:result.user.memberCode,
        roomId:result.user.roomId,
        roomCode:result.room?.code||form.roomCode.trim().toUpperCase(),
      };
      const nextProfiles={...authProfiles,[`${persisted.roomCode}::${String(persisted.username||'').toLowerCase()}`]:persisted};
      ss('lastAuthUser',persisted);
      ss('authProfiles',nextProfiles);
      ss('currentUser',result.user);
      onAuth(result.user);
      return;
    }
    const code=(form.roomCode.trim().toUpperCase()||genCode());
    const rooms=[...gs('rooms',[])];
    let room=rooms.find(r=>r.code===code);
    if(!room){
      room={id:'room-'+Date.now(),code,members:[],maxMembers:2};
      rooms.push(room);
    }
    const users=[...gs('users',[])];
    const reuseMemberCode=canReuse?String(savedProfile?.memberCode||'').trim().toUpperCase():'';
    const existing=
      (reuseMemberCode&&users.find(u=>u.memberCode===reuseMemberCode&&u.roomId===room.id))||null;
    if(room.members.length>=2&&!existing){setErr('このルームは満員です');return;}
    let user=existing||null;
    if(user){
      user.username=rawName;
      user.roomId=room.id;
      if(!room.members.includes(user.id))room.members.push(user.id);
    }else{
      let memberCode;
      do{
        memberCode=Math.random().toString(36).slice(2,6).toUpperCase();
      }while(users.some(u=>u.memberCode===memberCode));
      user={id:'u-'+Date.now(),username:rawName,memberCode,roomId:room.id};
      users.push(user);
      if(!room.members.includes(user.id))room.members.push(user.id);
    }
    ss('rooms',rooms);
    ss('users',users);
    const cu={...user,roomId:room.id};
    const persisted={id:cu.id,username:cu.username,memberCode:cu.memberCode,roomId:cu.roomId,roomCode:room.code};
    ss('lastAuthUser',persisted);
    ss('authProfiles',{...authProfiles,[`${room.code}::${String(cu.username||'').toLowerCase()}`]:persisted});
    ss('currentUser',cu);onAuth(cu);
  }

  return(
    <div className="auth-bg">
      <div className="auth-top-title">FIFA WORLD CUP 2026</div>
      <div className="auth-hero">
        <div className="auth-brand">
          <img className="auth-logo-art" src="./WorldCup_logo.png?v=20260419_234500" alt="FIFA WORLD CUP 2026" />
          <div className="auth-overlay messi" aria-hidden="true"></div>
          <div className="auth-overlay haaland" aria-hidden="true"></div>
        </div>
      </div>
      <div className="auth-card">
        <div className="field"><label>ユーザー名</label>
          <input value={form.username} onChange={set('username')} placeholder="例: YAMADA" maxLength={16}/>
        </div>
        <div className="field"><label>ルームコード</label>
          <input value={form.roomCode} onChange={set('roomCode')} placeholder="FIFA26" maxLength={12} style={{letterSpacing:'3px',fontWeight:800,fontSize:18}}/>
        </div>
        <p style={{fontSize:12,color:'var(--text2)',marginBottom:12,lineHeight:1.6}}>1ルーム2人まで入室可。友達同士で試合予想をしよう！</p>
        {err&&<div className="errmsg">{err}</div>}
        <button className="btn" style={{marginTop:12}} onClick={submit}>
          ルームに参加 / 作成
        </button>
        <button className="btn ghost" style={{marginTop:10}} onClick={startGuestMode}>
          ゲストで見る
        </button>
      </div>
    </div>
  );
}
