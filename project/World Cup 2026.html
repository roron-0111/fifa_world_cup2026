// ===== MATCH CARD =====
function MatchCard({match,userId,opponentId,preds,results,onSave,roomId,syncToken}){
  const lang=useContext(LangCtx);const l=T[lang];
  const users=gs('users',[]);
  const myPred=preds[userId]?.[match.id];
  const oppPred=opponentId?preds[opponentId]?.[match.id]:null;
  const result=results[match.id];
  const uiSettings=gs('settings',DEFAULT_UI_SETTINGS);
  const timeZone=uiSettings.timeZone||DEFAULT_UI_SETTINGS.timeZone;
  const locked=gr(roomId,'locked',{});
  const isLocked=(locked[userId]||[]).includes(match.id);
  const [home,setHome]=useState(myPred?.home??0);
  const [away,setAway]=useState(myPred?.away??0);
  const [localLocked,setLocalLocked]=useState(isLocked&&!!myPred);
  const myUserName=users.find((u)=>u.id===userId)?.username||'ユーザー名';
  const oppUserName=users.find((u)=>u.id===opponentId)?.username||'ユーザー名';
  const showTeam=t=>t.startsWith('TBD-')?placeholderLabel(t):teamJa(t);

  useEffect(()=>{
    setHome(myPred?.home??0);
    setAway(myPred?.away??0);
    setLocalLocked(isLocked&&!!myPred);
  },[syncToken,myPred?.home,myPred?.away,isLocked,match.id]);

  function doConfirm(){
    onSave(match.id,{home,away});
    const lk=gr(roomId,'locked',{});
    const arr=[...(lk[userId]||[])];
    if(!arr.includes(match.id))arr.push(match.id);
    lk[userId]=arr;sr(roomId,'locked',lk);
    setLocalLocked(true);
  }
  function doUnlock(){
    const lk=gr(roomId,'locked',{});
    lk[userId]=(lk[userId]||[]).filter(id=>id!==match.id);
    sr(roomId,'locked',lk);
    setLocalLocked(false);
  }
  function getPts(pred,res){
    if(!pred||!res)return null;
    const s=gr(roomId,'settings',DEFAULT_ROOM_SETTINGS);
    if(pred.home===res.home&&pred.away===res.away)return{pts:s.exactPts,type:'exact'};
    const pr=pred.home>pred.away?'H':pred.home<pred.away?'A':'D';
    const rr=res.home>res.away?'H':res.home<res.away?'A':'D';
    return pr===rr?{pts:s.resultPts,type:'result'}:{pts:0,type:'miss'};
  }
  const myScore=myPred&&result?getPts(myPred,result):null;
  return(
    <div className="mcard">
      <div className="mcard-hdr">
        <span>グループ {match.groupId}</span>
        <div style={{display:'flex',alignItems:'center',gap:6}}>
          {localLocked&&<span className="lock-tag">🔒 {l.confirm}済み</span>}
          {result&&<span style={{fontSize:10,background:'var(--goldf)',color:'var(--gold)',fontWeight:800,padding:'2px 8px',borderRadius:20}}>
            結果: {result.home}–{result.away}
          </span>}
        </div>
      </div>
      <div style={{padding:'7px 12px 0',fontSize:10,color:'var(--text2)',fontWeight:700,display:'flex',justifyContent:'space-between',gap:8,flexWrap:'wrap'}}>
        <span>{formatMatchDate(match.date,match.kickoff,timeZone)}</span>
        <span>{stadiumLabel(match.stadium,lang)}</span>
      </div>
      <div className="mcard-body">
        <div className="mteams">
          <div className="mt"><span className="fl"><TeamFlag team={match.home}/></span><div className="nm">{showTeam(match.home)}</div></div>
          <div className="result-display">
            <span className="result-score">{result?.home??'?'}</span>
            <span className="result-dash">–</span>
            <span className="result-score">{result?.away??'?'}</span>
          </div>
          <div className="mt"><span className="fl"><TeamFlag team={match.away}/></span><div className="nm">{showTeam(match.away)}</div></div>
        </div>
        <div className="pred-compare">
          <div className="pred-box me">
            <div className="ptag">あなた</div>
            <div className="pu">{myUserName}</div>
            {localLocked
              ?<div className="pv">{myPred?`${myPred.home}–${myPred.away}`:l.noPred}</div>
              :<div className="pred-edit">
                <div className="scw">
                  <button className="sarr" onClick={()=>setHome(h=>Math.min(20,h+1))}>▲</button>
                  <div className={`snum${home>0?' active':''}`}>{home}</div>
                  <button className="sarr" onClick={()=>setHome(h=>Math.max(0,h-1))}>▼</button>
                </div>
                <div className="sdiv">–</div>
                <div className="scw">
                  <button className="sarr" onClick={()=>setAway(a=>Math.min(20,a+1))}>▲</button>
                  <div className={`snum${away>0?' active':''}`}>{away}</div>
                  <button className="sarr" onClick={()=>setAway(a=>Math.max(0,a-1))}>▼</button>
                </div>
              </div>
            }
          </div>
          <div className="pred-box opp">
            <div className="ptag">相手</div>
            <div className="pu">{oppUserName}</div>
            <div className="pv">{oppPred?`${oppPred.home}–${oppPred.away}`:l.noPred}</div>
          </div>
        </div>
        <div className="mactions">
          {localLocked
            ?<><button className="ubtn" onClick={doUnlock}>🔓 {l.unlock}</button>
              {myScore&&<div style={{fontSize:11,fontWeight:800,padding:'6px 12px',borderRadius:8,
                background:myScore.type==='exact'?'var(--goldf)':myScore.type==='result'?'var(--greenf)':'rgba(100,100,100,.08)',
                color:myScore.type==='exact'?'var(--gold)':myScore.type==='result'?'var(--green)':'var(--text2)'}}>
                {myScore.type==='exact'?`⭐ +${myScore.pts}pt`:myScore.type==='result'?`✓ +${myScore.pts}pt`:'✗ +0'}
              </div>}
            </>
            :<button className="pbtn" onClick={doConfirm}>{l.confirm}</button>
          }
        </div>
      </div>
    </div>
  );
}

// ===== GROUPS =====
function GroupsScreen({user,onOpenTeam,syncToken}){
  const lang=useContext(LangCtx);const l=T[lang];
  const [activeG,setActiveG]=useState('A');
  const rooms=gs('rooms',[]);
  const room=rooms.find(r=>r.id===user.roomId);
  const roomId=room?.id||user.roomId;
  const users=gs('users',[]);
  const roomUsers=(() => {
    const byId=new Map();
    users.filter((u)=>u.roomId===roomId).forEach((u)=>byId.set(u.id,u));
    (room?.members||[])
      .map((id)=>users.find((u)=>u.id===id))
      .filter(Boolean)
      .forEach((u)=>byId.set(u.id,u));
    if(!byId.size&&user?.roomId===roomId)byId.set(user.id,user);
    return [...byId.values()];
  })();
  const [preds,setPreds]=useState(()=>grPred(roomId,{}));
  const [results,setResults]=useState(()=>gr(roomId,'results',{}));
  const oppId=roomUsers.find((m)=>m.id!==user.id)?.id||null;
  const group=GROUPS_RAW.find(g=>g.id===activeG);
  const matches=GROUP_MATCHES.filter(m=>m.groupId===activeG);

  useEffect(()=>{
    setPreds(grPred(roomId,{}));
    setResults(gr(roomId,'results',{}));
  },[syncToken,roomId]);

  function calcStandings(teams,results,groupId){
    const gm=GROUP_MATCHES.filter(m=>m.groupId===groupId);
    const st={};teams.forEach(t=>{st[t]={p:0,w:0,d:0,l:0,gf:0,ga:0,pts:0};});
    gm.forEach(m=>{
      const r=results[m.id];if(!r)return;
      st[m.home].p++;st[m.away].p++;
      st[m.home].gf+=r.home;st[m.home].ga+=r.away;
      st[m.away].gf+=r.away;st[m.away].ga+=r.home;
      if(r.home>r.away){st[m.home].w++;st[m.home].pts+=3;st[m.away].l++;}
      else if(r.home<r.away){st[m.away].w++;st[m.away].pts+=3;st[m.home].l++;}
      else{st[m.home].d++;st[m.home].pts++;st[m.away].d++;st[m.away].pts++;}
    });
    return teams.map(t=>({name:t,...st[t]})).sort((a,b)=>b.pts-a.pts||(b.gf-b.ga)-(a.gf-a.ga)||b.gf-a.gf||b.w-a.w);
  }
  const standings=calcStandings(group.teams,results,activeG);

  function savePred(matchId,pred){
    const u=savePrediction(roomId,user.id,matchId,pred);
    setPreds(u);
  }

  const qualColors=['var(--green)','var(--green)','',''];

  return(
    <div className="page page-enter">
      <div className="shdr"><h2>{l.groupStage}</h2></div>
      <div className="gtabs-scroll">
        <div className="gtabs">
          {GROUPS_RAW.map(g=><button key={g.id} className={`gtab${activeG===g.id?' on':''}`} onClick={()=>setActiveG(g.id)}>{g.id}組</button>)}
        </div>
      </div>
      <div className="section-title">{l.standings}</div>
      <div style={{padding:'0 16px 8px',fontSize:11,color:'var(--text2)'}}>国名をタップすると選手一覧が開きます</div>
      <div className="standings">
        <div className="sth">
          <span></span>
          <span>チーム</span>
          <span style={{textAlign:'center'}}>試合</span>
          <span style={{textAlign:'center'}}>勝</span>
          <span style={{textAlign:'center'}}>分</span>
          <span style={{textAlign:'center'}}>負</span>
          <span style={{textAlign:'center'}}>得点</span>
          <span style={{textAlign:'center'}}>失点</span>
          <span style={{textAlign:'center'}}>差</span>
          <span style={{textAlign:'center'}}>勝点</span>
        </div>
        {standings.map((t,i)=>(
          <div className="str" key={t.name} style={{cursor:'pointer'}} onClick={()=>onOpenTeam?.(t.name)}>
            <span className="pos">{i+1}</span>
            <span className="team-n"><div className="qi" style={{background:qualColors[i]||'transparent'}}/><span style={{fontSize:18}}><TeamFlag team={t.name}/></span><span className="team-name" style={{fontSize:11}}>{t.name.startsWith('TBD-')?placeholderLabel(t.name):teamJa(t.name)}</span></span>
            <span className="sv">{t.p}</span>
            <span className="sv">{t.w}</span>
            <span className="sv">{t.d}</span>
            <span className="sv">{t.l}</span>
            <span className="sv">{t.gf}</span>
            <span className="sv">{t.ga}</span>
            <span className="sv">{t.gf-t.ga}</span>
            <span className="pts-v">{t.pts}</span>
          </div>
        ))}
      </div>
      <div className="section-title">{l.predictions}</div>
      {matches.map(m=>(
        <MatchCard key={m.id} match={m} userId={user.id} opponentId={oppId}
          preds={preds} results={results} onSave={savePred} roomId={roomId} syncToken={syncToken}/>
      ))}
    </div>
  );
}

// ===== BRACKET =====
function BracketScreen({user,syncToken}){
  const lang=useContext(LangCtx);const l=T[lang];
  const rooms=gs('rooms',[]);
  const room=rooms.find(r=>r.id===user.roomId);
  const roomId=room?.id||user.roomId;
  const [koPreds,setKoPreds]=useState(()=>gr(roomId,'koPreds',{}));
  const myPreds=koPreds[user.id]||{};
  const sfRound=KO_ROUNDS.find((round)=>round.id==='SF');
  const finalRound=KO_ROUNDS.find((round)=>round.id==='F');
  const thirdRound=KO_ROUNDS.find((round)=>round.id==='3RD');

  useEffect(()=>{
    setKoPreds(gr(roomId,'koPreds',{}));
  },[syncToken,roomId]);

  function pick(matchId,side){
    const u={...koPreds,[user.id]:{...myPreds,[matchId]:side}};
    setKoPreds(u);sr(roomId,'koPreds',u);
  }

  function renderRound(round){
    return(
      <div className="bracket-col" key={round.id}>
        <div className="bracket-col-hdr">{round.label}</div>
        {round.matches.map((m,i)=>renderCard(round,m,i))}
      </div>
    );
  }

  function renderCard(round,m,i,final=false){
    const isFinal=final||round.id==='F';
    const winner=koWinnerLabel(round.id,i,myPreds);
    const loser=koLoserLabel(round.id,i,myPreds);
    return(
      <div className={`bracket-card${isFinal?' final':' compact'}`} key={m.id}>
        <div className="bracket-card-hdr">{round.label} / {m.id}</div>
        {(winner||loser)&&(
          <div className="bracket-summary">
            {winner&&(
              <span className={`bracket-pill${isFinal?' gold':''} on`}>
                <TeamFlag team={winner}/> 勝者 {teamJa(winner)}
              </span>
            )}
            {loser&&(
              <span className="bracket-pill">
                <TeamFlag team={loser}/> 敗者 {teamJa(loser)}
              </span>
            )}
          </div>
        )}
        {['home','away'].map(side=>(
          <div
            key={side}
            className={`bracket-team${myPreds[m.id]===side?' on':''}${winner===koResolvedTeam(round.id,i,side,myPreds)?' winner':''}${koResolvedTeam(round.id,i,side,myPreds)&&myPreds[m.id]?' resolved':''}`}
            onClick={()=>pick(m.id,side)}
          >
            <span className="bracket-fl"><TeamFlag team={koResolvedTeam(round.id,i,side,myPreds)||m[side]}/></span>
            <div className="bracket-name">{koSeedLabel(koResolvedTeam(round.id,i,side,myPreds)||m[side])}</div>
            {myPreds[m.id]===side&&<span className="bracket-check">✓</span>}
          </div>
        ))}
      </div>
    );
  }

  return(
    <div className="page page-enter">
      <div className="shdr"><h2>決勝T(未)</h2></div>
      <div className="section-title">横画面でも全体を見渡せるトーナメント表</div>
      <div className="bracket-tree">
        <div className="bracket-board">
          {KO_ROUNDS.filter((round)=>['R32','R16','QF'].includes(round.id)).map(renderRound)}
        </div>
        <div className="connector"/>
        <div className="bkt-final-section">
          <div className="bkt-sf-row">
            {sfRound.matches.map((m,i)=>renderCard(sfRound,m,i))}
          </div>
          <div className="connector"/>
          <div className="bkt-end-row">
            {finalRound.matches.map((m,i)=>renderCard(finalRound,m,i,true))}
            {thirdRound.matches.map((m,i)=>renderCard(thirdRound,m,i))}
          </div>
        </div>
        <div className="info-card" style={{margin:'12px 0 18px'}}>
          <div className="itag">🏆 予想の状態</div>
          <div className="isub">
            {koWinnerLabel('F',0,myPreds)
              ?<><TeamFlag team={koWinnerLabel('F',0,myPreds)}/> 優勝予想: {teamJa(koWinnerLabel('F',0,myPreds))}</>
              :'優勝チームをタップして選んでください'}
          </div>
          <div className="isub" style={{marginTop:4}}>
            {koWinnerLabel('3RD',0,myPreds)
              ?<><TeamFlag team={koWinnerLabel('3RD',0,myPreds)}/> 3位予想: {teamJa(koWinnerLabel('3RD',0,myPreds))}</>
              :'3位決定戦も選べます'}
          </div>
        </div>
      </div>
    </div>
  );
}

// ===== LEADERBOARD =====
function LeaderboardScreen({user,onOpenTeam}){
  const lang=useContext(LangCtx);const l=T[lang];
  const [query,setQuery]=useState('');
  const [countryFilter,setCountryFilter]=useState('all');
  const players=[...ALL_PLAYERS];
  const countries=[...GROUP_TEAM_KEYS].sort((a,b)=>teamJa(a).localeCompare(teamJa(b),'ja'));
  const queryNorm=normalizeSearchText(query);
  const filteredPlayers=players.filter((p)=>{
    if(countryFilter!=='all'&&p.country!==countryFilter)return false;
    if(!queryNorm)return true;
      const hay=normalizeSearchText([
      p.name,
      p.displayNameJa,
      p.countryJa||teamJa(p.country),
      p.country,
      p.position,
      p.club,
      p.goals,
      p.clubGoals,
    ].join(' '));
    return hay.includes(queryNorm);
  }).sort((a,b)=>b.goals-a.goals||playerDisplayName(a).localeCompare(playerDisplayName(b),'ja'));
  const top=[...filteredPlayers].sort((a,b)=>b.goals-a.goals||playerDisplayName(a).localeCompare(playerDisplayName(b),'ja'))[0]
    ||[...players].sort((a,b)=>b.goals-a.goals||b.clubGoals-a.clubGoals||playerDisplayName(a).localeCompare(playerDisplayName(b),'ja'))[0];
  const uiSettings=gs('settings',DEFAULT_UI_SETTINGS);
  const dataStamp=PLAYER_DATA_META.generatedAt ? formatTimestamp(PLAYER_DATA_META.generatedAt,uiSettings.timeZone) : '';

  return(
    <div className="page page-enter">
      <div className="shdr"><h2>得点ランキング(未)</h2></div>
      <div className="lb-hero">
        <div className="lb-bg-txt">W杯</div>
        <div className="lb-label">ワールドカップ得点</div>
        {dataStamp&&<div style={{fontSize:10,color:'rgba(255,255,255,.68)',marginTop:4}}>公開データ更新: {dataStamp}</div>}
        <div className="lb-vs-row" style={{gridTemplateColumns:'1fr'}}>
          <div className="lb-pl">
            <div className="lb-pl-name">トップスコアラー</div>
            <div className="lb-pl-pts">{top?.goals??0}</div>
            <div style={{fontSize:9,color:'rgba(255,255,255,.6)',marginTop:2}}>{playerDisplayName(top)||'--'}</div>
          </div>
        </div>
        <div style={{fontSize:10,color:'rgba(255,255,255,.68)',marginTop:8}}>対象国数: {GROUP_TEAM_KEYS.length}</div>
      </div>
      <div className="rank-tools">
        <input
          className="rank-search"
          value={query}
          onChange={(e)=>setQuery(e.target.value)}
          placeholder="選手名・国名・クラブ・ポジションで検索"
        />
      </div>
      <div className="rank-tools" style={{paddingTop:8}}>
        <div className="filter-wrap">
          <button className={`filter-chip${countryFilter==='all'?' on':''}`} onClick={()=>setCountryFilter('all')}>全て</button>
          {countries.map(country=>(
            <button
              key={country}
              className={`filter-chip${countryFilter===country?' on':''}`}
              onClick={()=>setCountryFilter(country)}
            >
              <TeamFlag team={country}/> {teamJa(country)}
            </button>
          ))}
        </div>
      </div>
      <div className="rank-meta">
        <span>表示 {filteredPlayers.length} / {players.length}</span>
        <span>{countryFilter==='all'?'国フィルタなし':teamJa(countryFilter)}</span>
      </div>
      <div className="section-title">選手一覧</div>
      <div className="rank-list">
        {filteredPlayers.length===0&&<div style={{padding:24,textAlign:'center',color:'var(--text2)',fontSize:13}}>条件に合う選手がいません</div>}
        {filteredPlayers.map((p,i)=>(
          <div className="rank-card" key={p.id}>
            <div className="rank-card-top">
              <div className="rank-card-left">
                <div className="rank-card-rank">#{i+1}</div>
                <div className="rank-card-name">{playerDisplayName(p)}</div>
                <div className="rank-card-meta">
                  <button className="rank-country" onClick={()=>onOpenTeam?.(p.country)}><TeamFlag team={p.country}/> <span>{teamJa(p.country)}</span></button>
                  <span>{positionJa(p.position)}</span>
                  <span>{p.club}</span>
                </div>
              </div>
              <div style={{textAlign:'right'}}>
                <div className="rank-score">{p.goals}</div>
                <div className="rank-score-sub">W杯得点</div>
              </div>
            </div>
          </div>
        ))}
      </div>
      <div style={{height:20}}/>
    </div>
  );
}

// ===== SETTINGS =====
const BG_THEME_SWATCHES=[
  {id:'cream',color:'#f2ede4',label:'クリーム'},
  {id:'sky',color:'#e8f0fb',label:'スカイ'},
  {id:'sakura',color:'#fdf0f5',label:'さくら'},
  {id:'mint',color:'#edf7f3',label:'ミント'},
  {id:'dark',color:'#0d1526',label:'ダーク'},
];

function SettingsScreen({user,syncToken}){
  const lang=useContext(LangCtx);const l=T[lang];
  const rooms=gs('rooms',[]);
  const room=rooms.find(r=>r.id===user.roomId);
  const roomId=room?.id||user.roomId;
  const [pointSettings,setPointSettings]=useState(()=>gr(roomId,'settings',DEFAULT_ROOM_SETTINGS));
  const [uiSettings,setUiSettings]=useState(()=>gs('settings',DEFAULT_UI_SETTINGS));
  const [toast,setToast]=useState('');

  useEffect(()=>{
    setPointSettings(gr(roomId,'settings',DEFAULT_ROOM_SETTINGS));
  },[syncToken,roomId]);

  function updUiSetting(k,v){
    const u={...uiSettings,[k]:v};
    setUiSettings(u);ss('settings',u);
    if(k==='bgTheme'){applyTheme(v);}
    if(k==='accentColor'){applyAccent(v);window.parent.postMessage({type:'__edit_mode_set_keys',edits:{accentColor:v}},'*');}
    notifyStateChange();
  }
  function updPointSetting(k,v){
    const u={...pointSettings,[k]:v};
    setPointSettings(u);sr(roomId,'settings',u);
  }
  function changePts(k,delta){
    updPointSetting(k,Math.max(0,Math.min(10,(pointSettings[k]||0)+delta)));
  }
  return(
    <div className="page page-enter">
      <div className="shdr"><h2>{l.settings}</h2><p>設定</p></div>
      {toast&&<Toast msg={toast} onDone={()=>setToast('')}/>}
      <div className="set-sec">
        <h3>🎨 {l.bgTheme}</h3>
        <div className="set-row" style={{flexDirection:'column',alignItems:'flex-start',gap:12}}>
          <div className="bg-picker">
            {BG_THEME_SWATCHES.map(s=>(
              <div key={s.id} title={s.label}
              className={`bg-swatch${uiSettings.bgTheme===s.id?' on':''}`}
              style={{background:s.color,border:'2px solid '+(uiSettings.bgTheme===s.id?'var(--accent)':'var(--border)')}}
              onClick={()=>updUiSetting('bgTheme',s.id)}/>
            ))}
          </div>
        </div>
      </div>
      <div className="set-sec">
        <h3>🕒 日時表示</h3>
        <div className="set-row" style={{flexDirection:'column',alignItems:'flex-start',gap:12}}>
          <div className="timezone-select">
            {DISPLAY_TIME_ZONES.map(z=>(
              <button
                key={z.id}
                className={`timezone-chip${uiSettings.timeZone===z.id?' on':''}`}
                onClick={()=>updUiSetting('timeZone',z.id)}
              >
                <span className="tz-main">{z.label}</span>
                <span className="tz-sub">{currentTimeInZone(z.id)}</span>
              </button>
            ))}
          </div>
          <div style={{fontSize:12,color:'var(--text2)',lineHeight:1.5}}>
            現在は {timeZoneLabel(uiSettings.timeZone)}（{currentTimeInZone(uiSettings.timeZone)}）表示です。試合日付や更新時刻がこの地域基準で表示されます。
          </div>
        </div>
      </div>
      <div className="set-sec">
        <h3>🧹 データ管理</h3>
        <div className="set-row" style={{flexDirection:'column',alignItems:'flex-start',gap:10}}>
          <div className="sl">予想データを一括削除<span>勝敗予想・得点結果・ロックを消去します</span></div>
          <button className="btn ghost" style={{width:'auto',marginTop:0,color:'var(--red)',borderColor:'var(--red)'}} onClick={()=>{
            if(confirm('予想データをすべて削除しますか？')){clearCompetitionData(roomId);setToast('予想データを削除しました');}
          }}>全データをクリア</button>
        </div>
      </div>
      <div className="set-sec">
        <h3>🏁 結果確定</h3>
        <div className="set-row" style={{flexDirection:'column',alignItems:'flex-start',gap:8}}>
          <div className="sl">確定トリガー<span>試合結果が `results` に入った瞬間に、勝敗とスコアを判定してポイントを再計算します。</span></div>
          <div style={{fontSize:12,color:'var(--text2)',lineHeight:1.6}}>
            いま表示される「結果確定」は、その試合の実スコアが保存された状態を意味します。
          </div>
        </div>
      </div>
      <div className="set-sec point-sec">
        <h3>🎯 {l.pointSettings}</h3>
        <>
          <div className="set-row">
            <div className="sl">{l.resultPts}<span>勝敗予想が当たった場合</span></div>
            <div className="pts-ctrl">
              <button className="ptsbtn" onClick={()=>changePts('resultPts',-1)}>−</button>
              <div className="pts-val">{pointSettings.resultPts}</div>
              <button className="ptsbtn" onClick={()=>changePts('resultPts',1)}>+</button>
            </div>
          </div>
          <div className="set-row">
            <div className="sl">{l.exactPts}<span>スコアが完全一致した場合</span></div>
            <div className="pts-ctrl">
              <button className="ptsbtn" onClick={()=>changePts('exactPts',-1)}>−</button>
              <div className="pts-val">{pointSettings.exactPts}</div>
              <button className="ptsbtn" onClick={()=>changePts('exactPts',1)}>+</button>
            </div>
          </div>
        </>
      </div>
    </div>
  );
}

// ===== TWEAKS PANEL =====
const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "accentColor": "blue",
  "bgTheme": "cream"
}/*EDITMODE-END*/;

function TweaksPanel(){
  const lang=useContext(LangCtx);
  const [t,setT]=useState(()=>({...TWEAK_DEFAULTS,...gs('tweaks',{})}));
  function set(k,v){
    const n={...t,[k]:v};setT(n);ss('tweaks',n);
    if(k==='accentColor'){applyAccent(v);window.parent.postMessage({type:'__edit_mode_set_keys',edits:{accentColor:v}},'*');}
    if(k==='bgTheme'){applyTheme(v);}
  }
  const accents=[{id:'blue',label:'ブルー'},{id:'red',label:'レッド'},{id:'purple',label:'パープル'},{id:'teal',label:'ティール'},{id:'orange',label:'オレンジ'}];
  return(
    <div className="tweaks-panel">
      <h4>⚡ Tweaks</h4>
      <div className="tw-row">
        <span className="tw-lbl">アクセント</span>
        <div className="tw-opts">
          {accents.map(a=><button key={a.id} className={`tw-opt${t.accentColor===a.id?' on':''}`} onClick={()=>set('accentColor',a.id)}>{a.label}</button>)}
        </div>
      </div>
      <div className="tw-row">
        <span className="tw-lbl">背景テーマ</span>
        <div className="tw-opts">
          {BG_THEME_SWATCHES.map(s=><button key={s.id} className={`tw-opt${t.bgTheme===s.id?' on':''}`} onClick={()=>set('bgTheme',s.id)}>{s.label}</button>)}
        </div>
      </div>
    </div>
  );
}

// ===== APP =====
function App(){
  const [user,setUser]=useState(()=>gs('currentUser',null));
  const [screen,setScreen]=useState('home');
  const [tweaksOpen,setTweaksOpen]=useState(false);
  const [lang]=useState('ja');
  const [selectedTeam,setSelectedTeam]=useState(null);
  const [syncTick,setSyncTick]=useState(0);

  useEffect(()=>{
    const handler=e=>{
      if(e.data?.type==='__activate_edit_mode')setTweaksOpen(true);
      if(e.data?.type==='__deactivate_edit_mode')setTweaksOpen(false);
    };
    const syncHandler=()=>setSyncTick(t=>t+1);
    window.addEventListener('message',handler);
    window.addEventListener('wc26-sync',syncHandler);
    window.parent.postMessage({type:'__edit_mode_available'},'*');
    // Apply saved theme & accent
    const saved=gs('settings',DEFAULT_UI_SETTINGS);
    applyTheme(saved.bgTheme||'cream');
    applyAccent(saved.accentColor||'blue');
    return()=>{
      window.removeEventListener('message',handler);
      window.removeEventListener('wc26-sync',syncHandler);
    };
  },[]);

  useEffect(()=>{
    refreshPlayerDataView();
    setSyncTick(t=>t+1);
  },[user?.roomId,user?.id]);

  useEffect(()=>{
    if(!HAS_BACKEND||!user?.roomId||user?.isGuest)return;
    let alive=true;
    const sync=async()=>{
      try{
        const res=await fetch(`/api/room/${encodeURIComponent(user.roomId)}`);
        if(!res.ok)return;
        const data=await res.json();
        if(!alive)return;
        if(Array.isArray(data.rooms))ss('rooms',data.rooms);
        if(Array.isArray(data.users))ss('users',data.users);
        if(data.playersByCountry&&Object.keys(data.playersByCountry).length){
          setPlayerData(data.playersByCountry,{
            generatedAt:data.generatedAt||PLAYER_DATA_META.generatedAt,
            sources:data.sources||PLAYER_DATA_META.sources,
          },false);
        }
        const roomState=data.room?.state||data.roomState;
        const roomId=data.room?.id||user.roomId;
        if(roomState){
          ss(roomDataKey(roomId,PREDICTION_STORE_KEY),roomState.predictionsV2||roomState.predictions||{});
          ss(roomDataKey(roomId,'results'),roomState.results||{});
          ss(roomDataKey(roomId,'locked'),roomState.locked||{});
          ss(roomDataKey(roomId,'koPreds'),roomState.koPreds||{});
          ss(roomDataKey(roomId,'settings'),roomState.settings||DEFAULT_ROOM_SETTINGS);
        }
        setSyncTick(t=>t+1);
      }catch{}
    };
    sync();
    const timer=setInterval(sync,4000);
    return()=>{alive=false;clearInterval(timer);};
  },[user?.roomId]);

  function handleLogout(){
    const current=gs('currentUser',null);
    if(current?.isGuest){
      ss('currentUser',null);
      setUser(null);
      return;
    }
    if(current){
      ss('lastAuthUser',{id:current.id,username:current.username,memberCode:current.memberCode,roomId:current.roomId,roomCode:(gs('rooms',[]).find(r=>r.id===current.roomId)?.code)||''});
    }
    ss('currentUser',null);
    setUser(null);
  }

  if(!user){
    return(
      <LangCtx.Provider value={lang}>
        <div className="shell"><AuthScreen onAuth={u=>{setUser(u);}}/></div>
      </LangCtx.Provider>
    );
  }

  const rooms=gs('rooms',[]);
  const room=rooms.find(r=>r.id===user.roomId);

  const screens={
    home:<HomeScreen user={user} onLogout={handleLogout} syncToken={syncTick}/>,
    groups:<GroupsScreen user={user} onOpenTeam={setSelectedTeam} syncToken={syncTick}/>,
    bracket:<BracketScreen user={user} syncToken={syncTick}/>,
    leaderboard:<LeaderboardScreen user={user} onOpenTeam={setSelectedTeam} syncToken={syncTick}/>,
    settings:<SettingsScreen user={user} syncToken={syncTick}/>,
  };

  return(
    <LangCtx.Provider value={lang}>
      <div className="shell">
        {screens[screen]}
        <BottomNav screen={screen} setScreen={setScreen}/>
        {tweaksOpen&&<TweaksPanel/>}
        {selectedTeam&&<CountryModal team={selectedTeam} onClose={()=>setSelectedTeam(null)}/>}
      </div>
    </LangCtx.Provider>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
